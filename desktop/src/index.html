<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semaphore UI Desktop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .dashboard {
            display: none;
        }
        
        .dashboard.active {
            display: block;
        }
        
        .login-form {
            display: block;
        }
        
        .login-form.hidden {
            display: none;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .task-list {
            margin-top: 20px;
        }
        
        .task-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .task-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .task-status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .task-status.running {
            background: #fff3cd;
            color: #856404;
        }
        
        .task-status.failed {
            background: #f8d7da;
            color: #721c24;
        }
        
        .logout-btn {
            background: #dc3545;
            margin-top: 20px;
        }
        
        .logout-btn:hover {
            box-shadow: 0 10px 20px rgba(220, 53, 69, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginForm" class="login-form">
            <h1>🚀 Semaphore UI</h1>
            <p class="subtitle">Desktop Application</p>
            
            <form id="connectForm">
                <div class="form-group">
                    <label for="serverUrl">URL сервера</label>
                    <input 
                        type="url" 
                        id="serverUrl" 
                        placeholder="http://localhost:3000"
                        value="http://localhost:3000"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="apiToken">API Token</label>
                    <input 
                        type="password" 
                        id="apiToken" 
                        placeholder="Введите ваш API токен"
                        required
                    >
                </div>
                
                <button type="submit" id="connectBtn">
                    Подключиться
                </button>
            </form>
            
            <div id="status" class="status" style="display: none;"></div>
        </div>
        
        <div id="dashboard" class="dashboard">
            <h1>📊 Dashboard</h1>
            <p class="subtitle">Добро пожаловать в Semaphore UI</p>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="projectCount">0</div>
                    <div class="stat-label">Проектов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="taskCount">0</div>
                    <div class="stat-label">Задач</div>
                </div>
            </div>
            
            <div class="task-list">
                <h3>Последние задачи</h3>
                <div id="taskList"></div>
            </div>
            
            <button class="logout-btn" id="logoutBtn">
                Отключиться
            </button>
        </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
