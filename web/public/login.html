<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Velum</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">
                    <img src="logo.png" alt="Semaphore">
                </div>
                <h1>Velum</h1>
                <p class="subtitle">DevOps Automation Platform</p>
            </div>

            <div id="error-alert"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" class="form-control"
                        placeholder="admin" value="admin" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" class="form-control"
                        placeholder="••••••••" value="admin123" required autocomplete="current-password">
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px;">
                    Войти
                </button>
            </form>

            <div class="alert alert-warning" style="margin-top:18px;margin-bottom:0;font-size:12.5px;">
                <strong>Demo:</strong> admin / admin123
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if (localStorage.getItem(STORAGE_KEY)) {
            window.location.href = '/';
        }

        $('#login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = $('#login-btn');
            btn.textContent = 'Вход...';
            btn.disabled = true;

            try {
                await api.login($('#username').value, $('#password').value);
                window.location.href = '/';
            } catch (error) {
                $('#error-alert').innerHTML = `
                    <div class="alert alert-danger" style="margin-bottom:16px;">${escapeHtml(error.message)}</div>
                `;
                btn.textContent = 'Войти';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
