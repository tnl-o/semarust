<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запуск - Velum</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2 id="run-title">Запуск</h2>
            </div>

            <div class="main-body">
                <div id="run-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        const playbookId = urlParams.get('playbook');
        const templateId = urlParams.get('tpl');

        if (!projectId) { window.location.href = 'index.html'; }

        // Route to appropriate run flow
        if (templateId) {
            // Template-based run (main flow)
            loadTemplateRun();
        } else if (playbookId) {
            // Playbook-based run (legacy)
            loadPlaybookRun();
        } else {
            // Show template selector
            loadTemplateSelectorRun();
        }

        // ---- Template-based run ----
        function loadTemplateRun() {
            Promise.all([
                api.getTemplate(projectId, templateId),
                api.getInventories(projectId).catch(() => []),
                api.getEnvironments(projectId).catch(() => [])
            ]).then(([tpl, inventories, environments]) => {
                document.title = 'Запуск — ' + tpl.name;
                $('#run-title').textContent = 'Запуск: ' + tpl.name;
                showTemplateRunForm(tpl, inventories, environments);
                loadRunBranchSuggestions(tpl);
            }).catch(err => ui.showError($('#run-content'), err.message));
        }

        function showTemplateRunForm(tpl, inventories, environments) {
            const content = $('#run-content');
            content.innerHTML = `
                <div style="max-width:720px; margin:0 auto;">
                    <div class="card" style="margin-bottom:16px;">
                        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <div>
                                <h3>${escapeHtml(tpl.name)}</h3>
                                <div style="color:var(--text-light); font-size:13px; margin-top:4px;">
                                    ${escapeHtml(tpl.playbook || '')}
                                    ${tpl.git_branch ? ' · ветка: ' + escapeHtml(tpl.git_branch) : ''}
                                </div>
                            </div>
                            <a href="template.html?id=${projectId}&tpl=${tpl.id}" class="btn btn-sm">← К шаблону</a>
                        </div>
                    </div>

                    <form id="run-form">
                        <div class="card" style="margin-bottom:16px;">
                            <h4 style="margin-bottom:16px;">Параметры запуска</h4>

                            <div class="form-group">
                                <label for="run-message">Комментарий (необязательно)</label>
                                <input type="text" id="run-message" class="form-control" placeholder="Описание запуска">
                            </div>

                            ${tpl.allow_override_branch_in_task ? `
                            <div class="form-group">
                                <label for="run-branch">Git ветка</label>
                                <input type="text" id="run-branch" class="form-control" value="${escapeHtml(tpl.git_branch || '')}" placeholder="main" list="run-branch-list">
                                <datalist id="run-branch-list"></datalist>
                            </div>` : ''}

                            ${tpl.allow_inventory_in_task ? `
                            <div class="form-group">
                                <label for="run-inventory">Инвентарь</label>
                                <select id="run-inventory" class="form-control">
                                    <option value="">По умолчанию (${tpl.inventory_id || 'не задан'})</option>
                                    ${inventories.map(inv => `<option value="${inv.id}" ${tpl.inventory_id === inv.id ? 'selected' : ''}>${escapeHtml(inv.name)}</option>`).join('')}
                                </select>
                            </div>` : ''}

                            ${tpl.allow_override_args_in_task ? `
                            <div class="form-group">
                                <label for="run-args">CLI аргументы</label>
                                <input type="text" id="run-args" class="form-control" value="${escapeHtml(tpl.arguments || '')}" placeholder="--extra-vars 'key=val'">
                            </div>` : ''}
                        </div>

                        <div style="display:flex; gap:10px; justify-content:flex-end;">
                            <a href="templates.html?id=${projectId}" class="btn">Отмена</a>
                            <button type="submit" id="run-btn" class="btn btn-primary">▶ Запустить</button>
                        </div>
                    </form>
                </div>
            `;

            $('#run-form').addEventListener('submit', e => {
                e.preventDefault();
                const btn = $('#run-btn');
                btn.disabled = true;
                btn.textContent = 'Запуск...';

                const body = { template_id: parseInt(templateId) };
                const msgEl = document.getElementById('run-message');
                const branchEl = document.getElementById('run-branch');
                const argsEl = document.getElementById('run-args');
                const invEl = document.getElementById('run-inventory');
                if (msgEl && msgEl.value.trim()) body.message = msgEl.value.trim();
                if (branchEl && branchEl.value.trim()) body.git_branch = branchEl.value.trim();
                if (argsEl && argsEl.value.trim()) body.arguments = argsEl.value.trim();
                if (invEl && invEl.value) body.inventory_id = parseInt(invEl.value);

                api.post('/project/' + projectId + '/tasks', body)
                    .then(task => {
                        ui.showAlert('Запущено! Задача #' + task.id, 'success');
                        setTimeout(() => {
                            window.location.href = 'task.html?id=' + projectId + '&task=' + task.id;
                        }, 800);
                    })
                    .catch(err => {
                        ui.showAlert('Ошибка: ' + err.message, 'danger');
                        btn.disabled = false;
                        btn.textContent = '▶ Запустить';
                    });
            });
        }

        // Load branch suggestions from repository into datalist
        function loadRunBranchSuggestions(tpl) {
            if (!tpl.repository_id || !tpl.allow_override_branch_in_task) return;
            api.getRepositoryBranches(projectId, tpl.repository_id)
                .then(branches => {
                    const dl = document.getElementById('run-branch-list');
                    if (dl) dl.innerHTML = (branches || []).map(b => `<option value="${escapeHtml(b)}">`).join('');
                })
                .catch(() => {});
        }

        // ---- Playbook-based run ----
        function loadPlaybookRun() {
            Promise.all([
                api.getPlaybook(projectId, playbookId),
                api.getInventories(projectId).catch(() => []),
                api.getEnvironments(projectId).catch(() => [])
            ]).then(([pb, inventories, environments]) => {
                document.title = 'Запуск — ' + pb.name;
                $('#run-title').textContent = 'Запуск: ' + pb.name;
                showPlaybookRunForm(pb, inventories, environments);
            }).catch(err => ui.showError($('#run-content'), err.message));
        }

        function showPlaybookRunForm(pb, inventories, environments) {
            const content = $('#run-content');
            content.innerHTML = `
                <div style="max-width:720px; margin:0 auto;">
                    <div class="card" style="margin-bottom:16px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <h3>${escapeHtml(pb.name)}</h3>
                            <a href="playbooks.html?id=${projectId}" class="btn btn-sm">← Playbooks</a>
                        </div>
                        ${pb.description ? `<p style="color:var(--text-light); margin-top:8px;">${escapeHtml(pb.description)}</p>` : ''}
                    </div>

                    <form id="run-form">
                        <div class="card" style="margin-bottom:16px;">
                            <h4 style="margin-bottom:16px;">Параметры</h4>
                            <div class="form-group">
                                <label for="run-inventory">Инвентарь *</label>
                                <select id="run-inventory" class="form-control" required>
                                    <option value="">Выберите инвентарь</option>
                                    ${inventories.map(inv => `<option value="${inv.id}">${escapeHtml(inv.name)}</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="run-env">Окружение</label>
                                <select id="run-env" class="form-control">
                                    <option value="">Не выбрано</option>
                                    ${environments.map(env => `<option value="${env.id}">${escapeHtml(env.name)}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div style="display:flex; gap:10px; justify-content:flex-end;">
                            <a href="playbooks.html?id=${projectId}" class="btn">Отмена</a>
                            <button type="submit" id="run-btn" class="btn btn-primary">▶ Запустить</button>
                        </div>
                    </form>
                </div>
            `;

            $('#run-form').addEventListener('submit', e => {
                e.preventDefault();
                const btn = $('#run-btn');
                btn.disabled = true;
                btn.textContent = 'Запуск...';
                const invId = document.getElementById('run-inventory').value;
                const envId = document.getElementById('run-env').value;

                const body = {};
                if (invId) body.inventory_id = parseInt(invId);
                if (envId) body.environment_id = parseInt(envId);

                api.post('/project/' + projectId + '/playbooks/' + playbookId + '/run', body)
                    .then(task => {
                        ui.showAlert('Playbook запущен! Задача #' + (task.id || ''), 'success');
                        setTimeout(() => {
                            window.location.href = task.id
                                ? 'task.html?id=' + projectId + '&task=' + task.id
                                : 'task.html?id=' + projectId;
                        }, 800);
                    })
                    .catch(err => {
                        ui.showAlert('Ошибка: ' + err.message, 'danger');
                        btn.disabled = false;
                        btn.textContent = '▶ Запустить';
                    });
            });
        }

        // ---- Template selector (no template specified) ----
        function loadTemplateSelectorRun() {
            api.getTemplates(projectId).then(templates => {
                $('#run-title').textContent = 'Выбор шаблона для запуска';
                const content = $('#run-content');
                if (!templates || templates.length === 0) {
                    ui.showEmpty(content, '📋', 'Нет шаблонов', 'Создайте шаблон чтобы запустить задачу');
                    return;
                }
                content.innerHTML = `
                    <div style="max-width:720px; margin:0 auto;">
                        <div class="card">
                            <h3 style="margin-bottom:16px;">Выберите шаблон для запуска</h3>
                            <div style="display:flex; flex-direction:column; gap:8px;">
                                ${templates.map(tpl => `
                                    <div style="display:flex; align-items:center; justify-content:space-between; padding:12px; border:1px solid var(--border); border-radius:6px;">
                                        <div>
                                            <strong>${escapeHtml(tpl.name)}</strong>
                                            <div style="font-size:12px; color:var(--text-light);">${escapeHtml(tpl.playbook || '')}</div>
                                        </div>
                                        <a href="run.html?id=${projectId}&tpl=${tpl.id}" class="btn btn-primary btn-sm">▶ Запустить</a>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).catch(err => ui.showError($('#run-content'), err.message));
        }
    </script>
</body>
</html>
