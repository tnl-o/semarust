<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шаблоны - Semaphore UI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2>🚀 Semaphore</h2>
            </div>
            <ul class="sidebar-nav">
                <li><a href="index.html">📊 Dashboard</a></li>
                <li><a href="project.html">📁 Проект</a></li>
                <li><a href="playbooks.html">📜 Playbooks</a></li>
                <li><a href="templates.html" class="active">📋 Шаблоны</a></li>
                <li><a href="inventory.html">📦 Инвентарь</a></li>
                <li><a href="environments.html">⚙️ Переменные</a></li>
                <li><a href="repositories.html">🗂️ Репозитории</a></li>
                <li><a href="keys.html">🔐 Ключи</a></li>
                <li><a href="schedules.html">⏰ Расписания</a></li>
                <li><a href="analytics.html">📈 Аналитика</a></li>
            </ul>
        </aside>

        <div class="main-content">
            <div class="main-header">
                <h2 id="project-title">Шаблоны</h2>
                <button class="btn btn-logout" onclick="api.logout()">Выйти</button>
            </div>

            <div class="main-body">
                <div class="page-header">
                    <h1>📋 Шаблоны</h1>
                    <button class="btn btn-primary" onclick="openTemplateModal()">+ Новый Шаблон</button>
                </div>

                <div id="templates-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка шаблонов...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        if (!projectId) {
            window.location.href = 'index.html';
        }

        api.getProject(projectId)
            .then(project => {
                $('#project-title').textContent = project.name + ' → Шаблоны';
                document.title = 'Шаблоны - ' + project.name;
            })
            .catch(console.error);

        loadTemplates();

        function loadTemplates() {
            const container = $('#templates-content');
            
            api.getTemplates(projectId)
                .then(templates => {
                    if (templates.length === 0) {
                        ui.showEmpty(container, '📋', 'Нет шаблонов', 'Создайте первый шаблон для запуска playbook');
                    } else {
                        container.innerHTML = `
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Название</th>
                                        <th>Playbook</th>
                                        <th>Инвентарь</th>
                                        <th>Окружение</th>
                                        <th>Репозиторий</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${templates.map(tpl => `
                                        <tr>
                                            <td><strong>${escapeHtml(tpl.name)}</strong></td>
                                            <td><code>${escapeHtml(tpl.playbook)}</code></td>
                                            <td>${tpl.inventory_id ? '📦 ID: ' + tpl.inventory_id : '—'}</td>
                                            <td>${tpl.environment_id ? '⚙️ ID: ' + tpl.environment_id : '—'}</td>
                                            <td>${tpl.repository_id ? '🗂️ ID: ' + tpl.repository_id : '—'}</td>
                                            <td>
                                                <button class="btn btn-success btn-sm" onclick="runTemplate(${tpl.id})" title="Запустить">▶</button>
                                                <button class="btn btn-sm" onclick="editTemplate(${tpl.id})" title="Редактировать">✏️</button>
                                                <button class="btn btn-danger btn-sm" onclick="deleteTemplate(${tpl.id})" title="Удалить">🗑️</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;
                    }
                })
                .catch(error => {
                    ui.showError(container, error.message);
                });
        }

        function editTemplate(id) {
            Promise.all([
                api.getTemplate(projectId, id),
                api.getPlaybooks(projectId).catch(() => []),
                api.getInventories(projectId).catch(() => []),
                api.getEnvironments(projectId).catch(() => []),
                api.getRepositories(projectId).catch(() => [])
            ])
            .then(([template, playbooks, inventories, environments, repositories]) => {
                openTemplateModal(template, { playbooks, inventories, environments, repositories });
            })
            .catch(error => {
                ui.showAlert('Ошибка: ' + error.message, 'danger');
            });
        }

        function deleteTemplate(id) {
            if (!confirm('Вы уверены что хотите удалить этот шаблон?')) return;

            api.deleteTemplate(projectId, id)
                .then(() => {
                    ui.showAlert('Шаблон удалён', 'success');
                    loadTemplates();
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                });
        }

        function runTemplate(id) {
            ui.showAlert('Запуск шаблона будет реализован в следующей версии', 'warning');
        }

        function openTemplateModal(template = null, refs = {}) {
            const isEdit = !!template;
            
            // Если данные для справочников не переданы, загружаем их
            if (!refs.playbooks) {
                Promise.all([
                    api.getPlaybooks(projectId).catch(() => []),
                    api.getInventories(projectId).catch(() => []),
                    api.getEnvironments(projectId).catch(() => []),
                    api.getRepositories(projectId).catch(() => [])
                ])
                .then(([playbooks, inventories, environments, repositories]) => {
                    renderModal(template, { playbooks, inventories, environments, repositories });
                })
                .catch(console.error);
            } else {
                renderModal(template, refs);
            }

            function renderModal(tpl, data) {
                const { playbooks, inventories, environments, repositories } = data;
                
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.id = 'template-modal';
                modal.innerHTML = `
                    <div class="modal" style="max-width: 700px;">
                        <div class="modal-header">
                            <h2>${isEdit ? '✏️ Редактирование' : '➕ Новый'} Шаблон</h2>
                        </div>
                        <form id="template-form">
                            <div class="form-group">
                                <label for="name">Название *</label>
                                <input type="text" id="name" class="form-control" required value="${escapeHtml(tpl?.name || '')}" placeholder="Deploy to Production">
                            </div>
                            <div class="form-group">
                                <label for="playbook">Playbook *</label>
                                <select id="playbook" class="form-control" required>
                                    <option value="">Выберите playbook</option>
                                    ${playbooks.map(pb => `<option value="${pb.name}" ${tpl?.playbook === pb.name ? 'selected' : ''}>${escapeHtml(pb.name)}</option>`).join('')}
                                </select>
                                <small style="color: var(--text-light);">Выберите playbook из списка или введите новый</small>
                            </div>
                            <div class="form-group">
                                <label for="description">Описание</label>
                                <textarea id="description" class="form-control" rows="2" placeholder="Описание шаблона">${escapeHtml(tpl?.description || '')}</textarea>
                            </div>
                            <div class="form-group">
                                <label for="inventory_id">Инвентарь *</label>
                                <select id="inventory_id" class="form-control" required>
                                    <option value="">Выберите инвентарь</option>
                                    ${inventories.map(inv => `<option value="${inv.id}" ${tpl?.inventory_id === inv.id ? 'selected' : ''}>${escapeHtml(inv.name)}</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="environment_id">Окружение</label>
                                <select id="environment_id" class="form-control">
                                    <option value="">Не выбрано</option>
                                    ${environments.map(env => `<option value="${env.id}" ${tpl?.environment_id === env.id ? 'selected' : ''}>${escapeHtml(env.name)}</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="repository_id">Репозиторий</label>
                                <select id="repository_id" class="form-control">
                                    <option value="">Не выбрано</option>
                                    ${repositories.map(repo => `<option value="${repo.id}" ${tpl?.repository_id === repo.id ? 'selected' : ''}>${escapeHtml(repo.name)}</option>`).join('')}
                                </select>
                                <small style="color: var(--text-light);">Репозиторий для загрузки playbook</small>
                            </div>
                            <div class="form-group">
                                <label for="git_branch">Ветка Git</label>
                                <input type="text" id="git_branch" class="form-control" value="${escapeHtml(tpl?.git_branch || 'main')}" placeholder="main">
                            </div>
                            <div class="form-group">
                                <label for="arguments">Аргументы командной строки</label>
                                <input type="text" id="arguments" class="form-control" value="${escapeHtml(tpl?.arguments || '')}" placeholder="--verbose --limit=host1">
                                <small style="color: var(--text-light);">Дополнительные аргументы для ansible-playbook</small>
                            </div>
                            <div class="form-group">
                                <label>
                                    <input type="checkbox" id="allow_override_args_in_task" ${tpl?.allow_override_args_in_task ? 'checked' : ''}>
                                    Разрешить переопределение аргументов при запуске
                                </label>
                            </div>
                            <div class="modal-footer" style="margin-top: 20px;">
                                <button type="button" class="btn" onclick="closeTemplateModal()">Отмена</button>
                                <button type="submit" class="btn btn-primary">${isEdit ? 'Сохранить' : 'Создать'}</button>
                            </div>
                        </form>
                    </div>
                `;
                document.body.appendChild(modal);

                $('#template-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    saveTemplate(tpl?.id);
                });

                modal.addEventListener('click', (e) => {
                    if (e.target === modal) closeTemplateModal();
                });
            }
        }

        function closeTemplateModal() {
            const modal = $('#template-modal');
            if (modal) modal.remove();
        }

        function saveTemplate(id) {
            const data = {
                name: $('#name').value.trim(),
                playbook: $('#playbook').value.trim(),
                description: $('#description').value.trim() || null,
                inventory_id: $('#inventory_id').value ? parseInt($('#inventory_id').value) : null,
                environment_id: $('#environment_id').value ? parseInt($('#environment_id').value) : null,
                repository_id: $('#repository_id').value ? parseInt($('#repository_id').value) : null,
                git_branch: $('#git_branch').value.trim() || 'main',
                arguments: $('#arguments').value.trim() || null,
                allow_override_args_in_task: $('#allow_override_args_in_task').checked,
                type: 'ansible',
                app: 'ansible'
            };

            if (!data.name) {
                ui.showAlert('Введите название', 'warning');
                return;
            }
            if (!data.playbook) {
                ui.showAlert('Выберите playbook', 'warning');
                return;
            }
            if (!data.inventory_id) {
                ui.showAlert('Выберите инвентарь', 'warning');
                return;
            }

            const btn = $('#template-form button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Сохранение...';

            const promise = id 
                ? api.updateTemplate(projectId, id, data)
                : api.createTemplate(projectId, data);

            promise
                .then(() => {
                    ui.showAlert(id ? 'Шаблон обновлён' : 'Шаблон создан', 'success');
                    closeTemplateModal();
                    loadTemplates();
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = id ? 'Сохранить' : 'Создать';
                });
        }

        window.editTemplate = editTemplate;
        window.deleteTemplate = deleteTemplate;
        window.runTemplate = runTemplate;
    </script>
</body>
</html>
