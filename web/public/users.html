<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи - Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>
    <div class="header">
        <h1><i class="fa-solid fa-rocket"></i> Velum</h1>
        <div class="user-menu">
            <span id="user-name">Admin</span>
            <a href="/" class="btn btn-sm" style="margin-right: 8px;">← Dashboard</a>
            <button class="btn-logout" onclick="api.logout()">Выйти</button>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1><i class="fa-solid fa-users"></i> Пользователи</h1>
            <button class="btn btn-primary" onclick="openUserModal()">+ Новый пользователь</button>
        </div>

        <div id="users-content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Загрузка пользователей...</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        loadUsers();

        function loadUsers() {
            const container = $('#users-content');

            api.getUsers()
                .then(users => {
                    if (users.length === 0) {
                        ui.showEmpty(container, '<i class="fa-solid fa-users"></i>', 'Нет пользователей', 'Создайте первого пользователя');
                    } else {
                        container.innerHTML = `
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Имя пользователя</th>
                                        <th>Полное имя</th>
                                        <th>Email</th>
                                        <th>Роль</th>
                                        <th>2FA</th>
                                        <th>Создан</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${users.map(u => `
                                        <tr>
                                            <td><strong>${escapeHtml(u.username)}</strong></td>
                                            <td>${escapeHtml(u.name || '—')}</td>
                                            <td>${escapeHtml(u.email || '—')}</td>
                                            <td>
                                                <span class="badge badge-${u.admin ? 'success' : 'warning'}">
                                                    ${u.admin ? '<i class="fa-solid fa-crown"></i> Admin' : '<i class="fa-solid fa-user"></i> User'}
                                                </span>
                                            </td>
                                            <td>
                                                ${u.totp_enabled
                                                    ? '<span class="badge badge-success">Включена</span>'
                                                    : '<span class="badge badge-secondary">Отключена</span>'
                                                }
                                            </td>
                                            <td>${formatDate(u.created)}</td>
                                            <td>
                                                <button class="btn btn-sm" onclick="editUser(${u.id})"><i class="fa-solid fa-pen"></i></button>
                                                <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})"><i class="fa-solid fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;
                    }
                })
                .catch(error => {
                    ui.showError(container, error.message);
                });
        }

        function editUser(id) {
            api.getUser(id)
                .then(user => openUserModal(user))
                .catch(error => ui.showAlert('Ошибка: ' + error.message, 'danger'));
        }

        function deleteUser(id) {
            if (!confirm('Удалить пользователя?')) return;
            api.deleteUser(id)
                .then(() => { ui.showAlert('Пользователь удалён', 'success'); loadUsers(); })
                .catch(error => ui.showAlert('Ошибка: ' + error.message, 'danger'));
        }

        function openUserModal(user = null) {
            const isEdit = !!user;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'user-modal';
            modal.innerHTML = `
                <div class="modal" style="max-width: 500px;">
                    <div class="modal-header">
                        <h2>${isEdit ? '<i class="fa-solid fa-pen"></i> Редактирование' : '<i class="fa-solid fa-plus"></i> Новый'} пользователь</h2>
                    </div>
                    <form id="user-form">
                        <div class="form-group">
                            <label for="username">Логин *</label>
                            <input type="text" id="username" class="form-control" required value="${escapeHtml(user?.username || '')}" placeholder="admin" ${isEdit ? 'readonly' : ''}>
                        </div>
                        <div class="form-group">
                            <label for="name">Полное имя</label>
                            <input type="text" id="name" class="form-control" value="${escapeHtml(user?.name || '')}" placeholder="Иван Иванов">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" class="form-control" value="${escapeHtml(user?.email || '')}" placeholder="user@example.com">
                        </div>
                        ${!isEdit ? `
                        <div class="form-group">
                            <label for="password">Пароль *</label>
                            <input type="password" id="password" class="form-control" required placeholder="Пароль пользователя">
                        </div>
                        ` : ''}
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="admin" ${user?.admin ? 'checked' : ''}>
                                Права администратора
                            </label>
                        </div>
                        ${isEdit && user?.id ? `
                        <div class="form-group">
                            <label>Двухфакторная аутентификация (TOTP)</label>
                            <div>
                                <button type="button" class="btn btn-sm" onclick="openTotpModal(${user.id}, ${user.totp_enabled ? 'true' : 'false'})">
                                    ${user.totp_enabled ? 'Отключить 2FA' : 'Включить 2FA'}
                                </button>
                            </div>
                        </div>
                        ` : ''}
                        <div class="modal-footer" style="margin-top: 20px;">
                            <button type="button" class="btn" onclick="closeUserModal()">Отмена</button>
                            <button type="submit" class="btn btn-primary">${isEdit ? 'Сохранить' : 'Создать'}</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);

            $('#user-form').addEventListener('submit', (e) => {
                e.preventDefault();
                saveUser(user?.id);
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeUserModal();
            });
        }

        function closeUserModal() {
            const m = $('#user-modal');
            if (m) m.remove();
            const t = $('#totp-modal');
            if (t) t.remove();
        }

        function saveUser(id) {
            const data = {
                username: $('#username').value.trim(),
                name: $('#name').value.trim() || null,
                email: $('#email').value.trim() || null,
                admin: $('#admin').checked
            };

            if (!data.username) { ui.showAlert('Введите логин', 'warning'); return; }

            if (!id) {
                const pwd = $('#password').value;
                if (!pwd) { ui.showAlert('Введите пароль', 'warning'); return; }
                data.password = pwd;
            }

            const btn = $('#user-form button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Сохранение...';

            const promise = id ? api.updateUser(id, data) : api.createUser(data);

            promise
                .then(() => {
                    ui.showAlert(id ? 'Пользователь обновлён' : 'Пользователь создан', 'success');
                    closeUserModal();
                    loadUsers();
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                    btn.disabled = false;
                    btn.textContent = id ? 'Сохранить' : 'Создать';
                });
        }

        function openTotpModal(userId, enabled) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'totp-modal';

            if (!enabled) {
                // Включение 2FA: показываем QR + секрет и поле ввода кода
                api.request('POST', `${API_BASE}/auth/totp/start`, {})
                    .then(res => {
                        const secret = res.secret;
                        const url = res.url;
                        const recovery = res.recovery_code;
                        modal.innerHTML = `
                            <div class="modal" style="max-width:480px;">
                                <div class="modal-header">
                                    <h2>Включение 2FA (TOTP)</h2>
                                </div>
                                <div class="modal-body">
                                    <p style="font-size:14px; color:var(--text-light);">
                                        Отсканируйте QR-код в приложении аутентификации (Google Authenticator, 1Password, Authy и др.)
                                        или введите секретный ключ вручную.
                                    </p>
                                    <div style="text-align:center; margin:12px 0;">
                                        <img src="${url}" alt="QR code" style="max-width:220px; border:1px solid var(--border); border-radius:4px; background:#fff;">
                                    </div>
                                    <div class="form-group">
                                        <label>Секретный ключ</label>
                                        <input type="text" class="form-control" value="${escapeHtml(secret)}" readonly>
                                    </div>
                                    <div class="form-group">
                                        <label>Код восстановления</label>
                                        <input type="text" class="form-control" value="${escapeHtml(recovery)}" readonly>
                                        <small style="color:var(--text-light);">Сохраните этот код — он понадобится чтобы отключить 2FA.</small>
                                    </div>
                                    <div class="form-group">
                                        <label for="totp-code">Подтверждающий код из приложения</label>
                                        <input type="text" id="totp-code" class="form-control" placeholder="123456" maxlength="6">
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn" onclick="closeUserModal()">Отмена</button>
                                    <button type="button" class="btn btn-primary" onclick="confirmTotpSetup()">Подтвердить</button>
                                </div>
                            </div>
                        `;
                        document.body.appendChild(modal);
                        modal.addEventListener('click', e => { if (e.target === modal) closeUserModal(); });
                    })
                    .catch(err => {
                        ui.showAlert('Не удалось начать настройку 2FA: ' + err.message, 'danger');
                    });
            } else {
                // Отключение 2FA: запрос кода восстановления
                modal.innerHTML = `
                    <div class="modal" style="max-width:420px;">
                        <div class="modal-header">
                            <h2>Отключение 2FA</h2>
                        </div>
                        <div class="modal-body">
                            <p style="font-size:14px; color:var(--text-light);">
                                Введите код восстановления, который вы сохранили при включении 2FA.
                            </p>
                            <div class="form-group">
                                <label for="totp-recovery">Код восстановления</label>
                                <input type="text" id="totp-recovery" class="form-control" placeholder="Вставьте сохранённый код">
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn" onclick="closeUserModal()">Отмена</button>
                            <button type="button" class="btn btn-primary" onclick="disableTotp()">Отключить 2FA</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                modal.addEventListener('click', e => { if (e.target === modal) closeUserModal(); });
            }
        }

        function confirmTotpSetup() {
            const code = (document.getElementById('totp-code') || {}).value || '';
            if (!code || code.length < 6) {
                ui.showAlert('Введите одноразовый код из приложения', 'warning');
                return;
            }
            const btn = document.querySelector('#totp-modal .btn.btn-primary');
            if (btn) { btn.disabled = true; btn.textContent = 'Проверка...'; }
            api.request('POST', `${API_BASE}/auth/totp/confirm`, { code: code.trim() })
                .then(() => {
                    ui.showAlert('2FA включена для вашего аккаунта', 'success');
                    closeUserModal();
                    loadUsers();
                })
                .catch(err => {
                    ui.showAlert('Не удалось подтвердить 2FA: ' + err.message, 'danger');
                    if (btn) { btn.disabled = false; btn.textContent = 'Подтвердить'; }
                });
        }

        function disableTotp() {
            const recovery = (document.getElementById('totp-recovery') || {}).value || '';
            if (!recovery) {
                ui.showAlert('Введите код восстановления', 'warning');
                return;
            }
            const btn = document.querySelector('#totp-modal .btn.btn-primary');
            if (btn) { btn.disabled = true; btn.textContent = 'Отключение...'; }
            api.request('POST', `${API_BASE}/auth/totp/disable`, { recovery_code: recovery.trim() })
                .then(() => {
                    ui.showAlert('2FA отключена для вашего аккаунта', 'success');
                    closeUserModal();
                    loadUsers();
                })
                .catch(err => {
                    ui.showAlert('Не удалось отключить 2FA: ' + err.message, 'danger');
                    if (btn) { btn.disabled = false; btn.textContent = 'Отключить 2FA'; }
                });
        }

        window.editUser = editUser;
        window.deleteUser = deleteUser;
    </script>
</body>
</html>
