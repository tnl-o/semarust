<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика - Velum</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2 id="project-title">Аналитика</h2>
                <div class="header-actions" style="flex-wrap:wrap; gap:8px; align-items:center;">
                    <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
                        <span style="font-size:12px; color:var(--text-light);">Период:</span>
                        <label style="font-size:12px; color:var(--text-light); display:flex; align-items:center; gap:4px;">
                            <input type="radio" name="period" value="today"> Сегодня
                        </label>
                        <label style="font-size:12px; color:var(--text-light); display:flex; align-items:center; gap:4px;">
                            <input type="radio" name="period" value="week" checked> Неделя
                        </label>
                        <label style="font-size:12px; color:var(--text-light); display:flex; align-items:center; gap:4px;">
                            <input type="radio" name="period" value="month"> Месяц
                        </label>
                        <label style="font-size:12px; color:var(--text-light); display:flex; align-items:center; gap:4px;">
                            <input type="radio" name="period" value="year"> Год
                        </label>
                    </div>
                    <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
                        <label for="user-filter" style="font-size:12px; color:var(--text-light);">Пользователь:</label>
                        <select id="user-filter" class="form-control" style="width:auto; min-width:180px;">
                            <option value="">Все пользователи</option>
                        </select>
                        <button class="btn btn-sm" onclick="applyAnalyticsFilters()">Применить</button>
                    </div>
                </div>
            </div>

            <div class="main-body">
                <div id="analytics-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка аналитики...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        if (!projectId) { window.location.href = 'index.html'; }

        let lineChart = null;
        let donutChart = null;
        let allTasks = [];
        let allUsers = [];

        api.getProject(projectId).then(p => {
            $('#project-title').textContent = p.name + ' → Аналитика';
            document.title = 'Аналитика - ' + p.name;
        }).catch(() => {});

        // Загрузка справочников и исходных данных (без фильтров)
        Promise.all([
            api.getTasks(projectId).catch(() => []),
            api.getTemplates(projectId).catch(() => []),
            api.getInventories(projectId).catch(() => []),
            api.getEnvironments(projectId).catch(() => []),
            api.getRepositories(projectId).catch(() => []),
            api.getKeys(projectId).catch(() => []),
            api.getUsers().catch(() => [])
        ]).then(([tasks, templates, inventories, environments, repositories, keys, users]) => {
            allTasks = tasks || [];
            allUsers = users || [];
            populateUserFilter(allUsers);
            applyAnalyticsFilters({ templates, inventories, environments, repositories, keys });
        }).catch(err => {
            ui.showError($('#analytics-content'), err.message);
        });

        function populateUserFilter(users) {
            const select = document.getElementById('user-filter');
            if (!select) return;
            select.innerHTML = '<option value=\"\">Все пользователи</option>' +
                users.map(u => `<option value=\"${u.username}\">${escapeHtml(u.username)}${u.name ? ' — ' + escapeHtml(u.name) : ''}</option>`).join('');
        }

        function getSelectedPeriodDays() {
            const val = (document.querySelector('input[name=\"period\"]:checked') || {}).value || 'week';
            if (val === 'today') return 1;
            if (val === 'week') return 7;
            if (val === 'month') return 30;
            if (val === 'year') return 365;
            return 7;
        }

        function applyAnalyticsFilters(preloadedRefs) {
            const days = getSelectedPeriodDays();
            const userVal = document.getElementById('user-filter').value;

            const filteredTasks = allTasks.filter(t => {
                let ok = true;
                if (userVal) {
                    const userName = t.user_name || t.user || '';
                    ok = ok && userName === userVal;
                }
                if (!ok) return false;
                const created = new Date(t.created || t.start || t.start_time || t.created_at || '');
                if (isNaN(created.getTime())) return false;
                const cutoff = new Date();
                cutoff.setDate(cutoff.getDate() - days);
                return created >= cutoff;
            });

            const { templates, inventories, environments, repositories, keys } = preloadedRefs || {};
            renderAnalytics(
                filteredTasks,
                templates || [],
                inventories || [],
                environments || [],
                repositories || [],
                keys || [],
                days
            );
        }

        function renderAnalytics(tasks, templates, inventories, environments, repositories, keys, days) {
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - days);

            const periodTasks = tasks.filter(t => new Date(t.created) >= cutoff);

            const total = periodTasks.length;
            const successful = periodTasks.filter(t => t.status === 'success').length;
            const failed = periodTasks.filter(t => t.status === 'error' || t.status === 'failed').length;
            const stopped = periodTasks.filter(t => t.status === 'cancelled').length;
            const running = periodTasks.filter(t => t.status === 'running').length;
            const waiting = periodTasks.filter(t => t.status === 'waiting').length;
            const successRate = total > 0 ? ((successful / total) * 100).toFixed(1) : '—';

            // Avg duration for completed tasks
            const completedWithTime = periodTasks.filter(t => t.start_time && t.end_time);
            let avgDurationStr = '—';
            if (completedWithTime.length > 0) {
                const avgSecs = completedWithTime.reduce((sum, t) => {
                    return sum + (new Date(t.end_time) - new Date(t.start_time)) / 1000;
                }, 0) / completedWithTime.length;
                avgDurationStr = avgSecs < 60 ? Math.round(avgSecs) + 'с' :
                    Math.floor(avgSecs / 60) + 'м ' + Math.round(avgSecs % 60) + 'с';
            }

            // Build time-series buckets (one per day)
            const buckets = {};
            for (let i = days - 1; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const key = d.toISOString().slice(0, 10);
                buckets[key] = { success: 0, failed: 0, stopped: 0 };
            }
            periodTasks.forEach(t => {
                const key = new Date(t.created).toISOString().slice(0, 10);
                if (!buckets[key]) return;
                if (t.status === 'success') buckets[key].success++;
                else if (t.status === 'error' || t.status === 'failed') buckets[key].failed++;
                else if (t.status === 'cancelled') buckets[key].stopped++;
            });
            const labels = Object.keys(buckets).map(k => {
                const [, m, d] = k.split('-');
                return d + '.' + m;
            });
            const successData = Object.values(buckets).map(b => b.success);
            const failedData  = Object.values(buckets).map(b => b.failed);
            const stoppedData = Object.values(buckets).map(b => b.stopped);

            const content = $('#analytics-content');
            content.innerHTML = `
                <!-- Summary cards -->
                <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px;">
                    <div class="card text-center" style="background:linear-gradient(135deg,#005057,#00897b); color:#fff; padding:20px;">
                        <div style="font-size:28px; margin-bottom:6px;">▶</div>
                        <div style="font-size:32px; font-weight:700;">${total}</div>
                        <div style="opacity:.85; font-size:14px;">Задач за период</div>
                    </div>
                    <div class="card text-center" style="background:linear-gradient(135deg,#276749,#38a169); color:#fff; padding:20px;">
                        <div style="font-size:28px; margin-bottom:6px;">✓</div>
                        <div style="font-size:32px; font-weight:700;">${successRate}${total > 0 ? '%' : ''}</div>
                        <div style="opacity:.85; font-size:14px;">Успешных</div>
                    </div>
                    <div class="card text-center" style="background:linear-gradient(135deg,#c53030,#e53e3e); color:#fff; padding:20px;">
                        <div style="font-size:28px; margin-bottom:6px;">✗</div>
                        <div style="font-size:32px; font-weight:700;">${failed}</div>
                        <div style="opacity:.85; font-size:14px;">Ошибок</div>
                    </div>
                    <div class="card text-center" style="background:linear-gradient(135deg,#744210,#dd6b20); color:#fff; padding:20px;">
                        <div style="font-size:28px; margin-bottom:6px;">⏱</div>
                        <div style="font-size:32px; font-weight:700;">${avgDurationStr}</div>
                        <div style="opacity:.85; font-size:14px;">Ср. время</div>
                    </div>
                </div>

                <!-- Charts row -->
                <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px; margin-bottom:24px;" class="analytics-charts-row">
                    <div class="card">
                        <h3 style="margin-bottom:12px;">Задачи по дням</h3>
                        <div style="position:relative; height:260px;">
                            <canvas id="line-chart"></canvas>
                        </div>
                    </div>
                    <div class="card">
                        <h3 style="margin-bottom:12px;">По статусам</h3>
                        <div style="position:relative; height:260px;">
                            <canvas id="donut-chart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Resource stats -->
                <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:20px;">
                    <div class="card">
                        <h3 style="margin-bottom:12px;">📁 Ресурсы проекта</h3>
                        ${[
                            ['📋 Шаблоны',    templates.length],
                            ['📦 Инвентари',  inventories.length],
                            ['⚙️ Окружения',  environments.length],
                            ['🗂️ Репозитории', repositories.length],
                            ['🔐 Ключи',       keys.length],
                        ].map(([label, val]) => `
                            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border);">
                                <span>${label}</span>
                                <strong>${val}</strong>
                            </div>`).join('')}
                    </div>
                    <div class="card">
                        <h3 style="margin-bottom:12px;">📊 Задачи по статусам</h3>
                        ${[
                            ['✓ Успешные',    successful, '#276749'],
                            ['✗ Ошибки',      failed,    '#c53030'],
                            ['■ Остановлены', stopped,   '#dd6b20'],
                            ['▶ Выполняются', running,   '#1976d2'],
                            ['⏳ Ожидают',    waiting,   '#666'],
                        ].map(([label, val, color]) => `
                            <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border);">
                                <span style="color:${color};">${label}</span>
                                <strong>${val}</strong>
                            </div>`).join('')}
                    </div>
                </div>
            `;

            // Render line chart
            setTimeout(() => {
                const lineCtx = document.getElementById('line-chart');
                if (lineCtx) {
                    if (lineChart) lineChart.destroy();
                    lineChart = new Chart(lineCtx, {
                        type: 'line',
                        data: {
                            labels,
                            datasets: [
                                { label: 'Успешные', data: successData, borderColor: '#38a169', backgroundColor: 'rgba(56,161,105,.1)', tension: 0.3, fill: true, pointRadius: 3 },
                                { label: 'Ошибки',   data: failedData,  borderColor: '#e53e3e', backgroundColor: 'rgba(229,62,62,.08)',  tension: 0.3, fill: true, pointRadius: 3 },
                                { label: 'Остановлены', data: stoppedData, borderColor: '#dd6b20', backgroundColor: 'rgba(221,107,32,.08)', tension: 0.3, fill: false, pointRadius: 3 }
                            ]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { position: 'top', labels: { boxWidth: 12, font: { size: 12 } } } },
                            scales: { y: { beginAtZero: true, ticks: { stepSize: 1, precision: 0 } } }
                        }
                    });
                }

                const donutCtx = document.getElementById('donut-chart');
                if (donutCtx) {
                    if (donutChart) donutChart.destroy();
                    const donutData = [
                        { label: 'Успешные',     value: successful, color: '#38a169' },
                        { label: 'Ошибки',       value: failed,     color: '#e53e3e' },
                        { label: 'Остановлены',  value: stopped,    color: '#dd6b20' },
                        { label: 'Выполняются',  value: running,    color: '#1976d2' },
                        { label: 'Ожидают',      value: waiting,    color: '#999'    },
                    ].filter(d => d.value > 0);

                    if (donutData.length === 0) {
                        donutCtx.parentElement.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:260px;color:var(--text-light);">Нет данных</div>';
                    } else {
                        donutChart = new Chart(donutCtx, {
                            type: 'doughnut',
                            data: {
                                labels: donutData.map(d => d.label),
                                datasets: [{ data: donutData.map(d => d.value), backgroundColor: donutData.map(d => d.color), borderWidth: 0 }]
                            },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 12 } } } }
                            }
                        });
                    }
                }
            }, 50);
        }

        loadAnalytics();
    </script>
    <style>
        @media (max-width: 768px) {
            .analytics-charts-row { grid-template-columns: 1fr !important; }
        }
    </style>
</body>
</html>
