<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Команда - Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2 id="project-title">Команда</h2>
            </div>

            <div class="main-body">
                <div class="page-header">
                    <h1><i class="fa-solid fa-users"></i> Команда проекта</h1>
                    <div id="page-action-btn" style="display:flex; gap:8px;">
                        <button class="btn btn-primary" onclick="openMemberModal()">+ Добавить участника</button>
                        <button class="btn" style="border-color:var(--danger); color:var(--danger);" onclick="leaveProject()" title="Покинуть проект">← Покинуть</button>
                    </div>
                </div>

                <div style="border-bottom:2px solid var(--border); margin-bottom:16px;">
                    <div style="display:flex; gap:0;">
                        <button id="tab-members" onclick="switchTab('members')" style="padding:8px 20px; border:none; background:transparent; cursor:pointer; font-size:14px; border-bottom:3px solid var(--primary); font-weight:600; color:var(--primary);">Участники</button>
                        <button id="tab-invites" onclick="switchTab('invites')" style="padding:8px 20px; border:none; background:transparent; cursor:pointer; font-size:14px; border-bottom:3px solid transparent; color:var(--text-light);">Приглашения</button>
                        <button id="tab-roles" onclick="switchTab('roles')" style="padding:8px 20px; border:none; background:transparent; cursor:pointer; font-size:14px; border-bottom:3px solid transparent; color:var(--text-light);">Роли</button>
                    </div>
                </div>

                <div id="team-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка команды...</p>
                    </div>
                </div>

                <div id="invites-content" style="display:none;"></div>
                <div id="roles-content" style="display:none;"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        if (!projectId) {
            window.location.href = 'index.html';
        }

        api.getProject(projectId)
            .then(project => {
                $('#project-title').textContent = project.name + ' → Команда';
                document.title = 'Команда - ' + project.name;
            })
            .catch(console.error);

        loadTeam();

        function loadTeam() {
            const container = $('#team-content');

            api.get('/project/' + projectId + '/users')
                .then(members => {
                    if (members.length === 0) {
                        ui.showEmpty(container, '<i class="fa-solid fa-users"></i>', 'Нет участников', 'Добавьте первого участника в проект');
                    } else {
                        container.innerHTML = `
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Пользователь</th>
                                        <th>Имя</th>
                                        <th>Роль</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${members.map(m => `
                                        <tr>
                                            <td><strong>${escapeHtml(m.username)}</strong></td>
                                            <td>${escapeHtml(m.name || '—')}</td>
                                            <td>${getRoleBadge(m.role)}</td>
                                            <td>
                                                <button class="btn btn-sm" onclick="editMember(${m.id}, '${escapeHtml(m.username)}', '${escapeHtml(m.role)}')" title="Изменить роль"><i class="fa-solid fa-pen"></i></button>
                                                <button class="btn btn-danger btn-sm" onclick="removeMember(${m.id}, '${escapeHtml(m.username)}')" title="Удалить из проекта"><i class="fa-solid fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;
                    }
                })
                .catch(error => {
                    ui.showError(container, error.message);
                });
        }

        function getRoleBadge(role) {
            const map = {
                'owner':       ['badge-success', '<i class="fa-solid fa-crown"></i> Owner'],
                'manager':     ['badge-primary', '<i class="fa-solid fa-wrench"></i> Manager'],
                'task_runner': ['badge-warning', '▶ Task Runner'],
                'guest':       ['badge-secondary', '<i class="fa-solid fa-eye"></i> Guest'],
                'none':        ['badge-danger',  'None'],
            };
            const [cls, label] = map[role] || ['badge-secondary', role];
            return `<span class="badge ${cls}">${label}</span>`;
        }

        function leaveProject() {
            if (!confirm('Вы уверены что хотите покинуть этот проект? Вы потеряете доступ.')) return;

            api.delete('/project/' + projectId + '/me')
                .then(() => {
                    ui.showAlert('Вы покинули проект', 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 1000);
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                });
        }

        function editMember(userId, username, currentRole) {
            openMemberModal({ id: userId, username, role: currentRole });
        }

        function removeMember(userId, username) {
            if (!confirm(`Удалить ${username} из проекта?`)) return;

            api.delete('/project/' + projectId + '/users/' + userId)
                .then(() => {
                    ui.showAlert('Участник удалён из проекта', 'success');
                    loadTeam();
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                });
        }

        function openMemberModal(member = null) {
            const isEdit = !!member;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'member-modal';

            // Для добавления нового участника нужен список всех пользователей
            const userSelectHtml = isEdit
                ? `<div class="form-group">
                       <label>Пользователь</label>
                       <input type="text" class="form-control" value="${escapeHtml(member.username)}" readonly>
                   </div>`
                : `<div class="form-group">
                       <label for="user_id">Пользователь *</label>
                       <select id="user_id" class="form-control" required>
                           <option value="">Загрузка...</option>
                       </select>
                   </div>`;

            modal.innerHTML = `
                <div class="modal" style="max-width: 500px;">
                    <div class="modal-header">
                        <h2>${isEdit ? '<i class="fa-solid fa-pen"></i> Изменить роль' : '<i class="fa-solid fa-plus"></i> Добавить участника'}</h2>
                    </div>
                    <form id="member-form">
                        ${userSelectHtml}
                        <div class="form-group">
                            <label for="role">Роль *</label>
                            <select id="role" class="form-control" required>
                                <option value="owner"       ${member?.role === 'owner'       ? 'selected' : ''}>Owner — полный контроль над проектом</option>
                                <option value="manager"     ${member?.role === 'manager'     ? 'selected' : ''}>Manager — управление шаблонами и ресурсами</option>
                                <option value="task_runner" ${member?.role === 'task_runner' ? 'selected' : ''}>Task Runner — только запуск задач</option>
                                <option value="guest"       ${member?.role === 'guest'       ? 'selected' : ''}>Guest — только просмотр</option>
                            </select>
                        </div>
                        <div class="modal-footer" style="margin-top: 20px;">
                            <button type="button" class="btn" onclick="closeMemberModal()">Отмена</button>
                            <button type="submit" class="btn btn-primary">${isEdit ? 'Сохранить' : 'Добавить'}</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);

            // Загружаем список пользователей для нового участника
            if (!isEdit) {
                api.getUsers()
                    .then(users => {
                        const select = $('#user_id');
                        select.innerHTML = '<option value="">Выберите пользователя</option>' +
                            users.map(u => `<option value="${u.id}">${escapeHtml(u.username)}${u.name ? ' (' + escapeHtml(u.name) + ')' : ''}</option>`).join('');
                    })
                    .catch(() => {
                        $('#user_id').innerHTML = '<option value="">Ошибка загрузки пользователей</option>';
                    });
            }

            $('#member-form').addEventListener('submit', (e) => {
                e.preventDefault();
                saveMember(member?.id);
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeMemberModal();
            });
        }

        function closeMemberModal() {
            const modal = $('#member-modal');
            if (modal) modal.remove();
        }

        function saveMember(userId) {
            const role = $('#role').value;
            const btn = $('#member-form button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Сохранение...';

            let promise;
            if (userId) {
                // Обновление роли
                promise = api.put('/project/' + projectId + '/users/' + userId, { role });
            } else {
                // Добавление нового участника
                const selectedUserId = $('#user_id').value;
                if (!selectedUserId) {
                    ui.showAlert('Выберите пользователя', 'warning');
                    btn.disabled = false;
                    btn.textContent = 'Добавить';
                    return;
                }
                promise = api.post('/project/' + projectId + '/users', {
                    user_id: parseInt(selectedUserId),
                    role
                });
            }

            promise
                .then(() => {
                    ui.showAlert(userId ? 'Роль обновлена' : 'Участник добавлен', 'success');
                    closeMemberModal();
                    loadTeam();
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = userId ? 'Сохранить' : 'Добавить';
                });
        }

        let currentTab = 'members';

        function switchTab(tab) {
            currentTab = tab;
            const isMembers = tab === 'members';
            const isInvites = tab === 'invites';
            const isRoles = tab === 'roles';

            const activeStyle = 'border-bottom:3px solid var(--primary); font-weight:600; color:var(--primary);';
            const inactiveStyle = 'border-bottom:3px solid transparent; color:var(--text-light);';

            const tabM = $('#tab-members');
            const tabI = $('#tab-invites');
            const tabR = $('#tab-roles');
            if (tabM) tabM.style.cssText = 'padding:8px 20px; border:none; background:transparent; cursor:pointer; font-size:14px; ' + (isMembers ? activeStyle : inactiveStyle);
            if (tabI) tabI.style.cssText = 'padding:8px 20px; border:none; background:transparent; cursor:pointer; font-size:14px; ' + (isInvites ? activeStyle : inactiveStyle);
            if (tabR) tabR.style.cssText = 'padding:8px 20px; border:none; background:transparent; cursor:pointer; font-size:14px; ' + (isRoles ? activeStyle : inactiveStyle);

            $('#team-content').style.display = isMembers ? 'block' : 'none';
            $('#invites-content').style.display = isInvites ? 'block' : 'none';
            $('#roles-content').style.display = isRoles ? 'block' : 'none';

            const actionBtn = $('#page-action-btn');
            if (tab === 'members') {
                actionBtn.innerHTML = '<button class="btn btn-primary" onclick="openMemberModal()">+ Добавить участника</button>';
            } else if (isInvites) {
                actionBtn.innerHTML = '<button class="btn btn-primary" onclick="openInviteModal()">+ Создать приглашение</button>';
                loadInvites();
            } else if (isRoles) {
                actionBtn.innerHTML = '<button class="btn btn-primary" onclick="openRoleModal()">+ Новая роль</button>';
                loadProjectRoles();
            }
        }

        // ---- Roles tab (custom roles) ----
        let projectRoles = [];

        function loadProjectRoles() {
            const container = $('#roles-content');
            ui.showLoading(container);
            api.request(`/project/${projectId}/roles`, { method: 'GET' })
                .then(data => {
                    projectRoles = data || [];
                    renderRolesTab();
                })
                .catch(err => {
                    if (err && /not implemented|not found|405|404/i.test(err.message)) {
                        container.innerHTML = `
                            <div class="card" style="max-width:620px;margin:0 auto;">
                                <h3 style="margin-bottom:8px;">Управление кастомными ролями недоступно</h3>
                                <p style="color:var(--text-light); font-size:14px; margin-bottom:0;">
                                    ${escapeHtml(err.message || 'Бэкенд API для кастомных ролей ещё не реализован. '
                                    + 'После реализации задач B-BE-09..B-BE-11 эта вкладка начнёт работать автоматически.')}
                                </p>
                            </div>
                        `;
                    } else {
                        ui.showError(container, err.message || 'Ошибка загрузки ролей');
                    }
                });
        }

        function renderRolesTab() {
            const container = $('#roles-content');
            if (!projectRoles.length) {
                container.innerHTML = `
                    <div class="card text-center" style="max-width:620px;margin:0 auto;">
                        <div style="font-size:40px;margin-bottom:10px;"><i class="fa-solid fa-key"></i></div>
                        <h3>Нет ролей</h3>
                        <p style="color:var(--text-light);">Создайте первую роль с нужным набором прав.</p>
                        <button class="btn btn-primary mt-2" onclick="openRoleModal()">+ Новая роль</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="card">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Название</th>
                                <th>Идентификатор</th>
                                <th>Права</th>
                                <th style="width:140px;">Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${projectRoles.map(r => {
                                const perms = r.permissions || 0;
                                const permLabels = [];
                                if (perms & 1) permLabels.push('▶ Запуск');
                                if (perms & 2) permLabels.push('<i class="fa-solid fa-pen"></i> Ресурсы');
                                if (perms & 4) permLabels.push('<i class="fa-solid fa-gear"></i> Проект');
                                if (perms & 8) permLabels.push('<i class="fa-solid fa-users"></i> Users');
                                if (perms & 16) permLabels.push('<i class="fa-solid fa-key"></i> Роли');
                                if (perms & 32) permLabels.push('<i class="fa-solid fa-clipboard"></i> Audit');
                                if (perms & 64) permLabels.push('<i class="fa-solid fa-link"></i> Интеграции');
                                if (perms & 128) permLabels.push('<i class="fa-solid fa-shield"></i> Секреты');
                                return `
                                <tr>
                                    <td><strong>${escapeHtml(r.name || '')}</strong></td>
                                    <td><code>${escapeHtml(r.slug || '')}</code></td>
                                    <td>${permLabels.join(', ') || '—'}</td>
                                    <td>
                                        <button class="btn btn-sm" onclick="openRoleModal(${r.id})"><i class="fa-solid fa-pen"></i></button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteRole(${r.id})"><i class="fa-solid fa-trash"></i></button>
                                    </td>
                                </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function openRoleModal(id) {
            const role = id != null ? projectRoles.find(r => r.id === id) : null;
            const isEdit = !!role;

            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.id = 'role-modal';
            overlay.innerHTML = `
                <div class="modal" style="max-width:520px;">
                    <div class="modal-header">
                        <h2>${isEdit ? '<i class="fa-solid fa-pen"></i> Редактирование роли' : '<i class="fa-solid fa-plus"></i> Новая роль'}</h2>
                    </div>
                    <form id="role-form">
                        <div class="form-group">
                            <label for="role-name">Название *</label>
                            <input id="role-name" type="text" class="form-control" required
                                   value="${escapeHtml(role?.name || '')}" placeholder="Оператор">
                        </div>
                        <div class="form-group">
                            <label for="role-slug">Идентификатор (slug) *</label>
                            <input id="role-slug" type="text" class="form-control" required
                                   value="${escapeHtml(role?.slug || '')}" placeholder="operator">
                            <p class="form-hint">Используется во внутренних правилах доступа.</p>
                        </div>
                        <div class="form-group">
                            <label>Права (permissions bitmask)</label>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;">
                                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                                    <input type="checkbox" id="perm-run_tasks" ${role?.permissions & 1 ? 'checked' : ''}>
                                    ▶ Запуск задач
                                </label>
                                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                                    <input type="checkbox" id="perm-update_resources" ${role?.permissions & 2 ? 'checked' : ''}>
                                    <i class="fa-solid fa-pen"></i> Обновление ресурсов
                                </label>
                                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                                    <input type="checkbox" id="perm-manage_project" ${role?.permissions & 4 ? 'checked' : ''}>
                                    <i class="fa-solid fa-gear"></i> Управление проектом
                                </label>
                                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                                    <input type="checkbox" id="perm-manage_users" ${role?.permissions & 8 ? 'checked' : ''}>
                                    <i class="fa-solid fa-users"></i> Управление пользователями
                                </label>
                                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                                    <input type="checkbox" id="perm-manage_roles" ${role?.permissions & 16 ? 'checked' : ''}>
                                    <i class="fa-solid fa-key"></i> Управление ролями
                                </label>
                                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                                    <input type="checkbox" id="perm-view_audit_log" ${role?.permissions & 32 ? 'checked' : ''}>
                                    <i class="fa-solid fa-clipboard"></i> Просмотр audit log
                                </label>
                                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                                    <input type="checkbox" id="perm-manage_integrations" ${role?.permissions & 64 ? 'checked' : ''}>
                                    <i class="fa-solid fa-link"></i> Управление интеграциями
                                </label>
                                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                                    <input type="checkbox" id="perm-manage_secret_storages" ${role?.permissions & 128 ? 'checked' : ''}>
                                    <i class="fa-solid fa-shield"></i> Управление хранилищами секретов
                                </label>
                            </div>
                            <p class="form-hint">8 бит прав: run_tasks, update_resources, manage_project, manage_users, manage_roles, view_audit_log, manage_integrations, manage_secret_storages</p>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn" onclick="closeRoleModal()">Отмена</button>
                            <button type="submit" class="btn btn-primary">${isEdit ? 'Сохранить' : 'Создать'}</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(overlay);

            document.getElementById('role-form').addEventListener('submit', function (e) {
                e.preventDefault();
                saveRole(role?.id || null);
            });

            overlay.addEventListener('click', function (e) {
                if (e.target === overlay) closeRoleModal();
            });
        }

        function closeRoleModal() {
            const m = document.getElementById('role-modal');
            if (m) m.remove();
        }

        function computePermissionsFromCheckboxes() {
            let mask = 0;
            if (document.getElementById('perm-run_tasks')?.checked) mask |= 1;
            if (document.getElementById('perm-update_resources')?.checked) mask |= 2;
            if (document.getElementById('perm-manage_project')?.checked) mask |= 4;
            if (document.getElementById('perm-manage_users')?.checked) mask |= 8;
            if (document.getElementById('perm-manage_roles')?.checked) mask |= 16;
            if (document.getElementById('perm-view_audit_log')?.checked) mask |= 32;
            if (document.getElementById('perm-manage_integrations')?.checked) mask |= 64;
            if (document.getElementById('perm-manage_secret_storages')?.checked) mask |= 128;
            return mask;
        }

        function saveRole(id) {
            const name = document.getElementById('role-name').value.trim();
            const slug = document.getElementById('role-slug').value.trim();

            if (!name || !slug) {
                ui.showAlert('Заполните название и идентификатор роли', 'warning');
                return;
            }

            const permissions = computePermissionsFromCheckboxes();

            const payload = {
                id: id || 0,
                project_id: parseInt(projectId, 10),
                name,
                slug,
                permissions
            };

            const method = id ? 'PUT' : 'POST';
            const url = `/project/${projectId}/roles` + (id ? `/${id}` : '');

            api.request(url, { method, body: JSON.stringify(payload) })
                .then(() => {
                    ui.showAlert(id ? 'Роль обновлена' : 'Роль создана', 'success');
                    closeRoleModal();
                    loadProjectRoles();
                })
                .catch(err => {
                    ui.showAlert('Ошибка сохранения роли: ' + err.message, 'danger');
                });
        }

        function deleteRole(id) {
            if (!confirm('Удалить эту роль?')) return;
            api.request(`/project/${projectId}/roles/${id}`, { method: 'DELETE' })
                .then(() => {
                    ui.showAlert('Роль удалена', 'success');
                    loadProjectRoles();
                })
                .catch(err => ui.showAlert('Ошибка удаления: ' + err.message, 'danger'));
        }

        function loadInvites() {
            const container = $('#invites-content');
            ui.showLoading(container);
            api.get('/project/' + projectId + '/invites')
                .then(invites => {
                    if (!invites || invites.length === 0) {
                        ui.showEmpty(container, '<i class="fa-solid fa-envelope fa-2x"></i>', 'Нет приглашений', 'Создайте приглашение чтобы добавить пользователя в проект');
                        return;
                    }
                    const baseUrl = window.location.origin;
                    container.innerHTML = `
                        <table class="table">
                            <thead><tr>
                                <th>Пользователь</th>
                                <th>Роль</th>
                                <th>Ссылка приглашения</th>
                                <th>Создан</th>
                                <th>Действия</th>
                            </tr></thead>
                            <tbody>
                                ${invites.map(inv => `
                                    <tr>
                                        <td><strong>${escapeHtml(inv.user_name || inv.user_email || 'ID: ' + inv.user_id)}</strong>
                                            ${inv.user_email ? `<div style="font-size:11px; color:var(--text-light);">${escapeHtml(inv.user_email)}</div>` : ''}
                                        </td>
                                        <td>${getRoleBadge(inv.role)}</td>
                                        <td>
                                            <div style="display:flex; align-items:center; gap:6px;">
                                                <code style="font-size:11px; background:#f5f5f5; padding:2px 6px; border-radius:4px; overflow:hidden; text-overflow:ellipsis; max-width:200px; display:inline-block;">${baseUrl}/accept_invite.html?token=${escapeHtml(inv.token)}</code>
                                                <button class="btn btn-sm" onclick="copyInviteLink('${escapeHtml(inv.token)}')" title="Копировать ссылку"><i class="fa-solid fa-list"></i></button>
                                            </div>
                                        </td>
                                        <td style="font-size:12px; color:var(--text-light);">${formatDate(inv.created)}</td>
                                        <td>
                                            <button class="btn btn-danger btn-sm" onclick="deleteInvite(${inv.id})" title="Удалить"><i class="fa-solid fa-trash"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                })
                .catch(err => ui.showError(container, err.message));
        }

        function copyInviteLink(token) {
            const url = window.location.origin + '/accept_invite.html?token=' + token;
            navigator.clipboard.writeText(url).then(() => ui.showAlert('Ссылка скопирована', 'success'))
                .catch(() => ui.showAlert('Скопируйте ссылку вручную: ' + url, 'info'));
        }

        function deleteInvite(id) {
            if (!confirm('Удалить приглашение?')) return;
            api.delete('/project/' + projectId + '/invites/' + id)
                .then(() => { ui.showAlert('Приглашение удалено', 'success'); loadInvites(); })
                .catch(err => ui.showAlert('Ошибка: ' + err.message, 'danger'));
        }

        function openInviteModal() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'invite-modal';
            document.body.appendChild(modal);

            api.getUsers().then(users => {
                modal.innerHTML = `
                    <div class="modal" style="max-width:480px;">
                        <div class="modal-header"><h2><i class="fa-solid fa-envelope"></i> Создать приглашение</h2></div>
                        <form id="invite-form">
                            <div class="form-group">
                                <label for="invite-user">Пользователь *</label>
                                <select id="invite-user" class="form-control" required>
                                    <option value="">Выберите пользователя</option>
                                    ${users.map(u => `<option value="${u.id}">${escapeHtml(u.username)}${u.name ? ' — ' + escapeHtml(u.name) : ''}</option>`).join('')}
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="invite-role">Роль *</label>
                                <select id="invite-role" class="form-control" required>
                                    <option value="owner">Owner</option>
                                    <option value="manager" selected>Manager</option>
                                    <option value="task_runner">Task Runner</option>
                                    <option value="guest">Guest</option>
                                </select>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn" onclick="document.getElementById('invite-modal').remove()">Отмена</button>
                                <button type="submit" class="btn btn-primary">Создать</button>
                            </div>
                        </form>
                    </div>
                `;
                modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
                $('#invite-form').addEventListener('submit', e => {
                    e.preventDefault();
                    const userId = parseInt($('#invite-user').value);
                    const role = $('#invite-role').value;
                    if (!userId) { ui.showAlert('Выберите пользователя', 'warning'); return; }
                    const btn = modal.querySelector('button[type="submit"]');
                    btn.disabled = true;
                    api.post('/project/' + projectId + '/invites', { user_id: userId, role })
                        .then(inv => {
                            modal.remove();
                            ui.showAlert('Приглашение создано', 'success');
                            loadInvites();
                            copyInviteLink(inv.token);
                        })
                        .catch(err => { ui.showAlert('Ошибка: ' + err.message, 'danger'); btn.disabled = false; });
                });
            }).catch(() => {
                modal.innerHTML = '<div class="modal" style="max-width:400px;"><p>Ошибка загрузки пользователей</p><div class="modal-footer"><button class="btn" onclick="this.closest(\'.modal-overlay\').remove()">Закрыть</button></div></div>';
            });
        }

        window.editMember = editMember;
        window.removeMember = removeMember;
        window.openRoleModal = openRoleModal;
        window.deleteProjectRole = deleteProjectRole;
    </script>
</body>
</html>
