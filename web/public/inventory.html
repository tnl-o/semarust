<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инвентари - Velum</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2 id="project-title">Инвентари</h2>
            </div>

            <div class="main-body">
                <div class="page-header">
                    <h1>📦 Инвентари</h1>
                    <button class="btn btn-primary" onclick="openInventoryModal()">+ Новый Инвентарь</button>
                </div>

                <div id="inventory-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка инвентарей...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        if (!projectId) {
            window.location.href = 'index.html';
        }

        api.getProject(projectId)
            .then(project => {
                $('#project-title').textContent = project.name + ' → Инвентари';
                document.title = 'Инвентари - ' + project.name;
            })
            .catch(console.error);

        loadInventory();

        function loadInventory() {
            const container = $('#inventory-content');
            
            api.getInventories(projectId)
                .then(inventories => {
                    if (inventories.length === 0) {
                        ui.showEmpty(container, '📦', 'Нет инвентарей', 'Создайте первый инвентарь');
                    } else {
                        container.innerHTML = `
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Название</th>
                                        <th>Тип</th>
                                        <th>Runner tag</th>
                                        <th>SSH ключ</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${inventories.map(inv => `
                                        <tr>
                                            <td><strong>${escapeHtml(inv.name)}</strong></td>
                                            <td><span class="badge">${escapeHtml(inv.inventory_type || 'static')}</span></td>
                                            <td>${escapeHtml(inv.runner_tag || '—')}</td>
                                            <td>${inv.ssh_key_id ? '🔐 ID: ' + inv.ssh_key_id : '—'}</td>
                                            <td>
                                                <button class="btn btn-sm" onclick="editInventory(${inv.id})">✏️</button>
                                                <button class="btn btn-danger btn-sm" onclick="deleteInventory(${inv.id})">🗑️</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;
                    }
                })
                .catch(error => {
                    ui.showError(container, error.message);
                });
        }

        function editInventory(id) {
            api.getInventory(projectId, id)
                .then(inv => {
                    openInventoryModal(inv);
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                });
        }

        function deleteInventory(id) {
            if (!confirm('Вы уверены что хотите удалить этот инвентарь?')) return;

            api.deleteInventory(projectId, id)
                .then(() => {
                    ui.showAlert('Инвентарь удалён', 'success');
                    loadInventory();
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                });
        }

        function openInventoryModal(inv = null) {
            const isEdit = !!inv;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'inventory-modal';
            modal.innerHTML = `
                <div class="modal" style="max-width: 600px;">
                    <div class="modal-header">
                        <h2>${isEdit ? '✏️ Редактирование' : '➕ Новый'} Инвентарь</h2>
                    </div>
                    <form id="inventory-form">
                        <div class="form-group">
                            <label for="name">Название *</label>
                            <input type="text" id="name" class="form-control" required value="${escapeHtml(inv?.name || '')}" placeholder="Production Servers">
                        </div>
                        <div class="form-group">
                            <label for="inventory_type">Тип *</label>
                            <select id="inventory_type" class="form-control" required onchange="toggleInventoryField()">
                                <option value="static" ${inv?.inventory_type === 'static' || !inv ? 'selected' : ''}>Статический INI</option>
                                <option value="static-yaml" ${inv?.inventory_type === 'static-yaml' ? 'selected' : ''}>Статический YAML</option>
                                <option value="file" ${inv?.inventory_type === 'file' ? 'selected' : ''}>Файл (путь)</option>
                                <option value="terraform-workspace" ${inv?.inventory_type === 'terraform-workspace' ? 'selected' : ''}>Terraform workspace</option>
                                <option value="tofu-workspace" ${inv?.inventory_type === 'tofu-workspace' ? 'selected' : ''}>OpenTofu workspace</option>
                            </select>
                        </div>
                        <div class="form-group" id="inv-content-group">
                            <label id="inv-content-label" for="inventory">Инвентарь (INI формат) *</label>
                            <textarea id="inventory" class="form-control" rows="10" placeholder="[webservers]&#10;web1.example.com&#10;web2.example.com" style="font-family:monospace; font-size:13px;">${escapeHtml(inv?.inventory_data || inv?.inventory || '')}</textarea>
                            <small id="inv-content-hint" style="color:var(--text-light);">INI: [group]\nhost1\nhost2</small>
                        </div>
                        <div class="form-group" id="inv-path-group" style="display:none;">
                            <label for="inv-path">Путь к файлу *</label>
                            <input type="text" id="inv-path" class="form-control" value="${escapeHtml(inv?.inventory_data || '')}" placeholder="/etc/ansible/hosts или путь в репозитории">
                        </div>
                        <div class="form-group">
                            <label for="runner_tag">Runner tag</label>
                            <input type="text" id="runner_tag" class="form-control" value="${escapeHtml(inv?.runner_tag || '')}" placeholder="prod-runner">
                            <small style="color:var(--text-light);">Тег runner'а для привязки выполнения на конкретные агенты.</small>
                        </div>
                        <div class="form-group">
                            <label for="ssh_key_id">Ключ подключения (SSH)</label>
                            <select id="ssh_key_id" class="form-control">
                                <option value="">Не выбрано</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="sudo_key_id">Ключ sudo (login/password)</label>
                            <select id="sudo_key_id" class="form-control">
                                <option value="">Не выбрано</option>
                            </select>
                        </div>
                        <div class="modal-footer" style="margin-top: 20px;">
                            <button type="button" class="btn" onclick="closeInventoryModal()">Отмена</button>
                            <button type="submit" class="btn btn-primary">${isEdit ? 'Сохранить' : 'Создать'}</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);

            // Загрузка ключей
            api.getKeys(projectId)
                .then(keys => {
                    const sshSel  = $('#ssh_key_id');
                    const sudoSel = $('#sudo_key_id');
                    sshSel.innerHTML  = '<option value="">Не выбрано</option>' +
                        keys.filter(k => k.type === 'ssh' || k.type === 'none').map(k =>
                            `<option value="${k.id}" ${inv?.ssh_key_id === k.id ? 'selected' : ''}>${escapeHtml(k.name)}</option>`).join('');
                    sudoSel.innerHTML = '<option value="">Не выбрано</option>' +
                        keys.filter(k => k.type === 'login_password').map(k =>
                            `<option value="${k.id}" ${inv?.sudo_key_id === k.id ? 'selected' : ''}>${escapeHtml(k.name)}</option>`).join('');
                })
                .catch(console.error);

            $('#inventory-form').addEventListener('submit', (e) => {
                e.preventDefault();
                saveInventory(inv?.id);
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeInventoryModal();
            });

            // Инициализация видимости поля
            toggleInventoryField();
        }

        function toggleInventoryField() {
            const type = $('#inventory_type').value;
            const isFile = type === 'file';
            const isYaml = type === 'static-yaml';
            $('#inv-content-group').style.display = isFile ? 'none' : '';
            $('#inv-path-group').style.display     = isFile ? '' : 'none';
            if (!isFile) {
                const lbl  = document.getElementById('inv-content-label');
                const hint = document.getElementById('inv-content-hint');
                lbl.textContent  = isYaml ? 'Инвентарь (YAML формат) *' : 'Инвентарь (INI формат) *';
                hint.textContent = isYaml ? 'YAML: all:\n  hosts:\n    host1:' : 'INI: [group]\nhost1\nhost2';
            }
        }

        function closeInventoryModal() {
            const modal = $('#inventory-modal');
            if (modal) modal.remove();
        }

        function saveInventory(id) {
            const type = $('#inventory_type').value;
            const isFile = type === 'file';
            const usesContent = type === 'static' || type === 'static-yaml';
            const invContent = isFile
                ? document.getElementById('inv-path').value.trim()
                : $('#inventory').value.trim();
            const data = {
                name: $('#name').value.trim(),
                inventory_type: type,
                inventory: usesContent ? invContent : null,
                inventory_data: isFile ? invContent : (usesContent ? null : invContent),
                ssh_key_id:  $('#ssh_key_id').value  ? parseInt($('#ssh_key_id').value)  : null,
                sudo_key_id: $('#sudo_key_id').value ? parseInt($('#sudo_key_id').value) : null,
                runner_tag: $('#runner_tag').value.trim() || null
            };

            if (!data.name) {
                ui.showAlert('Введите название', 'warning');
                return;
            }
            if ((type === 'static' || type === 'static-yaml' || type === 'file') && !invContent) {
                ui.showAlert('Введите инвентарь или путь к файлу', 'warning');
                return;
            }

            const btn = $('#inventory-form button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Сохранение...';

            const promise = id 
                ? api.updateInventory(projectId, id, data)
                : api.createInventory(projectId, data);

            promise
                .then(() => {
                    ui.showAlert(id ? 'Инвентарь обновлён' : 'Инвентарь создан', 'success');
                    closeInventoryModal();
                    loadInventory();
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = id ? 'Сохранить' : 'Создать';
                });
        }

        window.editInventory = editInventory;
        window.deleteInventory = deleteInventory;
    </script>
</body>
</html>
