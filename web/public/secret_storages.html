<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хранилища секретов - Velum</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2 id="project-title">Хранилища секретов</h2>
                <button class="btn btn-primary" id="add-storage-btn">+ Новое хранилище</button>
            </div>

            <div class="main-body">
                <div id="storages-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка хранилищ...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        if (!projectId) {
            window.location.href = 'index.html';
        }

        const storagesContent = document.getElementById('storages-content');
        const addBtn          = document.getElementById('add-storage-btn');

        api.getProject(projectId)
            .then(project => {
                document.getElementById('project-title').textContent = project.name + ' → Хранилища секретов';
                document.title = 'Хранилища секретов - ' + project.name;
            })
            .catch(() => {});

        let secretStorages = [];

        function showStub(message) {
            storagesContent.innerHTML = `
                <div class="card" style="max-width:640px;margin:0 auto;">
                    <h3 style="margin-bottom:8px;">Функция хранилищ секретов недоступна</h3>
                    <p style="color:var(--text-light); font-size:14px; margin-bottom:0;">
                        ${escapeHtml(message || 'Бэкенд API для secret storages пока не отвечает. ' +
                        'Если соответствующие эндпоинты будут реализованы, эта страница автоматически начнёт работать.')}
                    </p>
                </div>
            `;
        }

        function loadSecretStorages() {
            api.request(`/project/${projectId}/secret_storages`, { method: 'GET' })
                .then(data => {
                    secretStorages = data || [];
                    renderSecretStorages();
                })
                .catch(err => {
                    if (err && /not implemented|not found|404|501/i.test(err.message)) {
                        showStub(err.message);
                        addBtn.disabled = true;
                    } else {
                        ui.showError(storagesContent, err.message || 'Ошибка загрузки хранилищ');
                    }
                });
        }

        function renderSecretStorages() {
            if (!secretStorages.length) {
                storagesContent.innerHTML = `
                    <div class="card text-center" style="max-width:640px;margin:0 auto;">
                        <div style="font-size:40px;margin-bottom:10px;">🗝️</div>
                        <h3>Нет хранилищ секретов</h3>
                        <p style="color:var(--text-light);">Добавьте Vault или DVLS хранилище для совместного использования секретов.</p>
                        <button class="btn btn-primary mt-2" onclick="openStorageModal()">+ Новое хранилище</button>
                    </div>
                `;
                return;
            }

            storagesContent.innerHTML = `
                <div class="card">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Название</th>
                                <th>Тип</th>
                                <th>Режим</th>
                                <th style="width:220px;">Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${secretStorages.map(s => `
                                <tr>
                                    <td><strong>${escapeHtml(s.name || '')}</strong></td>
                                    <td><code>${escapeHtml(s.type || '')}</code></td>
                                    <td>
                                        ${s.read_only ? '<span class="badge badge-secondary">Только чтение</span>' :
                                            '<span class="badge badge-success">Чтение/запись</span>'}
                                    </td>
                                    <td>
                                        ${s.type === 'dvls'
                                            ? `<button class="btn btn-sm" onclick="syncStorage(${s.id})" title="Синхронизировать">🔄 Синхронизировать</button>`
                                            : ''}
                                        <button class="btn btn-sm" onclick="openStorageModal(${s.id})">✏️</button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteStorage(${s.id})">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function openStorageModal(id) {
            const storage = id != null ? secretStorages.find(s => s.id === id) : null;
            const isEdit = !!storage;

            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.id = 'storage-modal';
            overlay.innerHTML = `
                <div class="modal" style="max-width:640px;">
                    <div class="modal-header">
                        <h2>${isEdit ? '✏️ Редактирование хранилища' : '➕ Новое хранилище'}</h2>
                    </div>
                    <form id="storage-form" style="max-height:80vh;overflow-y:auto;padding-right:4px;">
                        <div class="form-group">
                            <label for="st-name">Название *</label>
                            <input id="st-name" type="text" class="form-control" required
                                   value="${escapeHtml(storage?.name || '')}" placeholder="Vault / DVLS">
                        </div>
                        <div class="form-group">
                            <label for="st-type">Тип *</label>
                            <select id="st-type" class="form-control" onchange="onStorageTypeChange()">
                                <option value="vault" ${storage?.type === 'vault' ? 'selected' : ''}>Vault</option>
                                <option value="dvls" ${storage?.type === 'dvls' ? 'selected' : ''}>DVLS</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="st-readonly" ${storage?.read_only ? 'checked' : ''}>
                                Только чтение
                            </label>
                        </div>

                        <div id="vault-section" style="display:${!storage || storage?.type === 'vault' ? '' : 'none'}">
                            <div class="form-group">
                                <label for="vault-url">Vault URL *</label>
                                <input id="vault-url" type="text" class="form-control"
                                       value="${escapeHtml(storage?.vault_url || '')}" placeholder="https://vault.example.com">
                            </div>
                            <div class="form-group">
                                <label for="vault-mount">Vault mount</label>
                                <input id="vault-mount" type="text" class="form-control"
                                       value="${escapeHtml(storage?.vault_mount || 'secret')}" placeholder="secret">
                            </div>
                        </div>

                        <div id="dvls-section" style="display:${storage?.type === 'dvls' ? '' : 'none'}">
                            <div class="form-group">
                                <label for="dvls-url">DVLS URL *</label>
                                <input id="dvls-url" type="text" class="form-control"
                                       value="${escapeHtml(storage?.dvls_url || '')}" placeholder="https://dvls.example.com">
                            </div>
                            <div class="form-group">
                                <label>
                                    <input type="checkbox" id="dvls-skip-tls" ${storage?.dvls_skip_tls ? 'checked' : ''}>
                                    Пропускать проверку TLS
                                </label>
                            </div>
                            <div class="form-group">
                                <label for="dvls-vault-id">DVLS vault ID</label>
                                <input id="dvls-vault-id" type="text" class="form-control"
                                       value="${escapeHtml(storage?.dvls_vault_id || '')}">
                            </div>
                            <div class="form-group">
                                <label for="dvls-app-key">DVLS app key</label>
                                <input id="dvls-app-key" type="text" class="form-control"
                                       value="${escapeHtml(storage?.dvls_app_key || '')}">
                            </div>
                            <div class="form-group">
                                <label for="dvls-sync-paths">Пути синхронизации (JSON массив)</label>
                                <textarea id="dvls-sync-paths" class="form-control" rows="3"
                                          placeholder='[\"path/one\", \"path/two\"]'
                                          style="font-family:monospace;font-size:12px;">${escapeHtml(storage?.dvls_sync_paths || '')}</textarea>
                            </div>
                        </div>

                        <div class="modal-footer" style="margin-top:18px;">
                            <button type="button" class="btn" onclick="closeStorageModal()">Отмена</button>
                            <button type="submit" class="btn btn-primary">${isEdit ? 'Сохранить' : 'Создать'}</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(overlay);

            document.getElementById('storage-form').addEventListener('submit', function (e) {
                e.preventDefault();
                saveStorage(storage?.id || null);
            });

            overlay.addEventListener('click', function (e) {
                if (e.target === overlay) closeStorageModal();
            });
        }

        function closeStorageModal() {
            const m = document.getElementById('storage-modal');
            if (m) m.remove();
        }

        function onStorageTypeChange() {
            const t = document.getElementById('st-type').value;
            document.getElementById('vault-section').style.display = t === 'vault' ? '' : 'none';
            document.getElementById('dvls-section').style.display  = t === 'dvls' ? '' : 'none';
        }

        function saveStorage(id) {
            const name = document.getElementById('st-name').value.trim();
            const type = document.getElementById('st-type').value;
            const readOnly = document.getElementById('st-readonly').checked;

            if (!name) {
                ui.showAlert('Введите название хранилища', 'warning');
                return;
            }

            const payload = {
                id: id || 0,
                project_id: parseInt(projectId, 10),
                name,
                type,
                read_only: readOnly
            };

            if (type === 'vault') {
                const url = document.getElementById('vault-url').value.trim();
                const mount = document.getElementById('vault-mount').value.trim() || 'secret';
                if (!url) {
                    ui.showAlert('Введите Vault URL', 'warning');
                    return;
                }
                payload.vault_url = url;
                payload.vault_mount = mount;
            } else {
                const dvlsUrl = document.getElementById('dvls-url').value.trim();
                if (!dvlsUrl) {
                    ui.showAlert('Введите DVLS URL', 'warning');
                    return;
                }
                payload.dvls_url = dvlsUrl;
                payload.dvls_skip_tls = document.getElementById('dvls-skip-tls').checked;
                payload.dvls_vault_id = document.getElementById('dvls-vault-id').value.trim() || null;
                payload.dvls_app_key  = document.getElementById('dvls-app-key').value.trim() || null;
                const syncRaw = document.getElementById('dvls-sync-paths').value.trim();
                if (syncRaw) {
                    try {
                        JSON.parse(syncRaw);
                        payload.dvls_sync_paths = syncRaw;
                    } catch (e) {
                        ui.showAlert('Неверный JSON в полях синхронизации DVLS', 'warning');
                        return;
                    }
                } else {
                    payload.dvls_sync_paths = null;
                }
            }

            const method = id ? 'PUT' : 'POST';
            const url = `/project/${projectId}/secret_storages` + (id ? `/${id}` : '');

            api.request(url, { method, body: JSON.stringify(payload) })
                .then(() => {
                    ui.showAlert(id ? 'Хранилище обновлено' : 'Хранилище создано', 'success');
                    closeStorageModal();
                    loadSecretStorages();
                })
                .catch(err => ui.showAlert('Ошибка сохранения: ' + err.message, 'danger'));
        }

        function deleteStorage(id) {
            if (!confirm('Удалить это хранилище секретов?')) return;
            api.request(`/project/${projectId}/secret_storages/${id}`, { method: 'DELETE' })
                .then(() => {
                    ui.showAlert('Хранилище удалено', 'success');
                    loadSecretStorages();
                })
                .catch(err => ui.showAlert('Ошибка удаления: ' + err.message, 'danger'));
        }

        function syncStorage(id) {
            api.request(`/project/${projectId}/secret_storages/${id}/sync`, { method: 'POST' })
                .then(() => {
                    ui.showAlert('Синхронизация запущена', 'success');
                })
                .catch(err => ui.showAlert('Ошибка синхронизации: ' + err.message, 'danger'));
        }

        addBtn.addEventListener('click', () => openStorageModal());

        loadSecretStorages();

        window.openStorageModal = openStorageModal;
        window.deleteStorage = deleteStorage;
        window.syncStorage = syncStorage;
        window.onStorageTypeChange = onStorageTypeChange;
    </script>
</body>
</html>
