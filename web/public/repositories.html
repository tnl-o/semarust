<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Репозитории - Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2 id="project-title">Репозитории</h2>
            </div>

            <div class="main-body">
                <div class="page-header">
                    <h1><i class="fa-solid fa-code-branch"></i> Репозитории</h1>
                    <button class="btn btn-primary" onclick="openRepositoryModal()">+ Новый Репозиторий</button>
                </div>

                <div id="repositories-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка репозиториев...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        if (!projectId) {
            window.location.href = 'index.html';
        }

        api.getProject(projectId)
            .then(project => {
                $('#project-title').textContent = project.name + ' → Репозитории';
                document.title = 'Репозитории - ' + project.name;
            })
            .catch(console.error);

        loadRepositories();

        function loadRepositories() {
            const container = $('#repositories-content');
            
            api.getRepositories(projectId)
                .then(repos => {
                    if (repos.length === 0) {
                        ui.showEmpty(container, '<i class="fa-solid fa-code-branch fa-2x"></i>', 'Нет репозиториев', 'Создайте первый репозиторий');
                    } else {
                        container.innerHTML = `
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Название</th>
                                        <th>Git URL</th>
                                        <th>Ветка</th>
                                        <th>Ключ доступа</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${repos.map(repo => `
                                        <tr>
                                            <td><strong>${escapeHtml(repo.name)}</strong></td>
                                            <td><code style="font-size: 12px;">${escapeHtml(repo.git_url)}</code></td>
                                            <td><span class="badge">${repo.git_branch || 'main'}</span></td>
                                            <td><i class="fa-solid fa-lock"></i> ID: ${repo.key_id || '—'}</td>
                                            <td>
                                                <button class="btn btn-sm" onclick="editRepository(${repo.id})"><i class="fa-solid fa-pen"></i></button>
                                                <button class="btn btn-danger btn-sm" onclick="deleteRepository(${repo.id})"><i class="fa-solid fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;
                    }
                })
                .catch(error => {
                    ui.showError(container, error.message);
                });
        }

        function editRepository(id) {
            api.getRepository(projectId, id)
                .then(repo => {
                    openRepositoryModal(repo);
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                });
        }

        function deleteRepository(id) {
            if (!confirm('Вы уверены что хотите удалить этот репозиторий?')) return;

            api.deleteRepository(projectId, id)
                .then(() => {
                    ui.showAlert('Репозиторий удалён', 'success');
                    loadRepositories();
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                });
        }

        function openRepositoryModal(repo = null) {
            const isEdit = !!repo;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'repository-modal';
            modal.innerHTML = `
                <div class="modal" style="max-width: 600px;">
                    <div class="modal-header">
                        <h2>${isEdit ? '<i class="fa-solid fa-pen"></i> Редактирование' : '<i class="fa-solid fa-plus"></i> Новый'} Репозиторий</h2>
                    </div>
                    <form id="repository-form">
                        <div class="form-group">
                            <label for="name">Название *</label>
                            <input type="text" id="name" class="form-control" required value="${escapeHtml(repo?.name || '')}" placeholder="my-project">
                        </div>
                        <div class="form-group">
                            <label for="git_url">Git URL *</label>
                            <input type="text" id="git_url" class="form-control" required value="${escapeHtml(repo?.git_url || '')}" placeholder="https://github.com/user/repo.git">
                        </div>
                        <div class="form-group">
                            <label for="git_branch">Ветка</label>
                            <input type="text" id="git_branch" class="form-control" value="${escapeHtml(repo?.git_branch || 'main')}" placeholder="main">
                        </div>
                        <div class="form-group">
                            <label for="git_path">Путь (опционально)</label>
                            <input type="text" id="git_path" class="form-control" value="${escapeHtml(repo?.git_path || '')}" placeholder="playbooks/">
                            <small style="color: var(--text-light);">Подкаталог в репозитории</small>
                        </div>
                        <div class="form-group">
                            <label for="key_id">Ключ доступа *</label>
                            <select id="key_id" class="form-control" required>
                                <option value="">Не выбрано</option>
                            </select>
                        </div>
                        <div class="modal-footer" style="margin-top: 20px;">
                            <button type="button" class="btn" onclick="closeRepositoryModal()">Отмена</button>
                            <button type="submit" class="btn btn-primary">${isEdit ? 'Сохранить' : 'Создать'}</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);

            // Загрузка ключей
            api.getKeys(projectId)
                .then(keys => {
                    const select = $('#key_id');
                    select.innerHTML = '<option value="">Не выбрано</option>' + 
                        keys.map(k => `<option value="${k.id}" ${repo?.key_id === k.id ? 'selected' : ''}>${escapeHtml(k.name)}</option>`).join('');
                })
                .catch(console.error);

            $('#repository-form').addEventListener('submit', (e) => {
                e.preventDefault();
                saveRepository(repo?.id);
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeRepositoryModal();
            });
        }

        function closeRepositoryModal() {
            const modal = $('#repository-modal');
            if (modal) modal.remove();
        }

        function saveRepository(id) {
            const data = {
                name: $('#name').value.trim(),
                git_url: $('#git_url').value.trim(),
                git_branch: $('#git_branch').value.trim() || 'main',
                git_path: $('#git_path').value.trim() || null,
                key_id: $('#key_id').value ? parseInt($('#key_id').value) : null
            };

            if (!data.name) {
                ui.showAlert('Введите название', 'warning');
                return;
            }
            if (!data.git_url) {
                ui.showAlert('Введите Git URL', 'warning');
                return;
            }
            if (!data.key_id) {
                ui.showAlert('Выберите ключ доступа', 'warning');
                return;
            }

            const btn = $('#repository-form button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Сохранение...';

            const promise = id 
                ? api.updateRepository(projectId, id, data)
                : api.createRepository(projectId, data);

            promise
                .then(() => {
                    ui.showAlert(id ? 'Репозиторий обновлён' : 'Репозиторий создан', 'success');
                    closeRepositoryModal();
                    loadRepositories();
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = id ? 'Сохранить' : 'Создать';
                });
        }

        window.editRepository = editRepository;
        window.deleteRepository = deleteRepository;
    </script>
</body>
</html>
