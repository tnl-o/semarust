<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проект - Semaphore UI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2 id="project-title">Загрузка...</h2>
            </div>

            <div class="main-body">
                <div id="project-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка проекта...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        // Получить ID проекта из URL
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        if (!projectId) {
            window.location.href = 'index.html';
        }

        // Загрузка проекта и статистики
        Promise.all([
            api.getProject(projectId),
            api.getPlaybooks(projectId).catch(() => []),
            api.getTemplates(projectId).catch(() => []),
            api.getInventories(projectId).catch(() => []),
            api.getEnvironments(projectId).catch(() => [])
        ])
        .then(([project, playbooks, templates, inventories, environments]) => {
            $('#project-title').textContent = project.name;
            document.title = project.name + ' - Semaphore UI';
            showProjectDashboard(project, { playbooks, templates, inventories, environments });
        })
        .catch(error => {
            ui.showError($('#project-content'), error.message);
        });

        async function renameProject() {
            const input = document.getElementById('project-name-input');
            const msg = document.getElementById('rename-msg');
            const name = input ? input.value.trim() : '';
            if (!name) { if (msg) msg.textContent = 'Название не может быть пустым'; return; }
            try {
                await api.updateProject(projectId, { name });
                document.getElementById('project-title').textContent = name;
                document.title = name + ' - Semaphore UI';
                if (msg) { msg.style.color = 'var(--success, green)'; msg.textContent = '✅ Сохранено'; }
            } catch (e) {
                if (msg) { msg.style.color = '#e74c3c'; msg.textContent = '❌ ' + e.message; }
            }
        }

        async function saveSettings(e) {
            e.preventDefault();
            const name = document.getElementById('proj-name').value.trim();
            const parallel = parseInt(document.getElementById('proj-parallel').value) || 0;
            const telegram = document.getElementById('proj-telegram').value.trim() || null;
            const alert = document.getElementById('proj-alerts').checked;
            const msg = document.getElementById('settings-msg');
            try {
                await api.updateProject(projectId, {
                    name,
                    max_parallel_tasks: parallel,
                    telegram_chat: telegram,
                    alert
                });
                $('#project-title').textContent = name;
                document.title = name + ' - Semaphore UI';
                msg.style.color = '#276749';
                msg.textContent = '✅ Настройки сохранены';
                setTimeout(() => { msg.textContent = ''; }, 3000);
            } catch (err) {
                msg.style.color = '#c53030';
                msg.textContent = '❌ ' + err.message;
            }
        }

        async function backupProject() {
            try {
                const [project, templates, inventories, environments, repositories, keys] = await Promise.all([
                    api.getProject(projectId),
                    api.getTemplates(projectId).catch(() => []),
                    api.getInventories(projectId).catch(() => []),
                    api.getEnvironments(projectId).catch(() => []),
                    api.getRepositories(projectId).catch(() => []),
                    api.getKeys(projectId).catch(() => [])
                ]);
                const backup = {
                    exported_at: new Date().toISOString(),
                    project, templates, inventories, environments, repositories, keys
                };
                const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
                const url  = URL.createObjectURL(blob);
                const a    = document.createElement('a');
                const ts   = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                a.href = url;
                a.download = 'semaphore-backup-' + projectId + '-' + ts + '.json';
                a.click();
                URL.revokeObjectURL(url);
                ui.showAlert('Резервная копия скачана', 'success');
            } catch (err) {
                ui.showAlert('Ошибка резервного копирования: ' + err.message, 'danger');
            }
        }

        async function confirmDeleteProject() {
            if (!confirm('Удалить проект? Это действие необратимо.')) return;
            try {
                await api.deleteProject(projectId);
                window.location.href = 'index.html';
            } catch (e) {
                alert('Ошибка удаления: ' + e.message);
            }
        }

        function showProjectDashboard(project, stats) {
            const content = $('#project-content');
            content.innerHTML = `
                <div class="grid" style="margin-bottom: 30px;">
                    <div class="card text-center">
                        <div style="font-size: 32px; margin-bottom: 10px;">📜</div>
                        <div style="font-size: 24px; font-weight: bold; color: var(--primary);">${stats.playbooks.length}</div>
                        <div style="color: var(--text-light);">Playbooks</div>
                        <a href="playbooks.html?id=${projectId}" class="btn btn-primary btn-sm mt-2">Открыть</a>
                    </div>
                    <div class="card text-center">
                        <div style="font-size: 32px; margin-bottom: 10px;">📋</div>
                        <div style="font-size: 24px; font-weight: bold; color: var(--primary);">${stats.templates.length}</div>
                        <div style="color: var(--text-light);">Шаблоны</div>
                        <a href="templates.html?id=${projectId}" class="btn btn-primary btn-sm mt-2">Открыть</a>
                    </div>
                    <div class="card text-center">
                        <div style="font-size: 32px; margin-bottom: 10px;">📦</div>
                        <div style="font-size: 24px; font-weight: bold; color: var(--primary);">${stats.inventories.length}</div>
                        <div style="color: var(--text-light);">Инвентари</div>
                        <a href="inventory.html?id=${projectId}" class="btn btn-primary btn-sm mt-2">Открыть</a>
                    </div>
                    <div class="card text-center">
                        <div style="font-size: 32px; margin-bottom: 10px;">⚙️</div>
                        <div style="font-size: 24px; font-weight: bold; color: var(--primary);">${stats.environments.length}</div>
                        <div style="color: var(--text-light);">Окружения</div>
                        <a href="environments.html?id=${projectId}" class="btn btn-primary btn-sm mt-2">Открыть</a>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-bottom: 15px;">О проекте</h3>
                    <p style="color: var(--text-light); line-height: 1.8;">
                        ${escapeHtml(project.description || 'Нет описания')}
                    </p>
                    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);">
                        <div style="display: flex; gap: 30px; color: var(--text-light); font-size: 14px;">
                            <div><strong>ID:</strong> ${project.id}</div>
                            <div><strong>Создан:</strong> ${formatDate(project.created)}</div>
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <h3 style="margin-bottom: 15px;">Быстрый доступ</h3>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <a href="playbooks.html?id=${projectId}" class="btn btn-primary">📜 Playbooks</a>
                        <a href="templates.html?id=${projectId}" class="btn btn-primary">📋 Шаблоны</a>
                        <a href="inventory.html?id=${projectId}" class="btn btn-primary">📦 Инвентарь</a>
                        <a href="environments.html?id=${projectId}" class="btn btn-primary">⚙️ Окружения</a>
                        <a href="repositories.html?id=${projectId}" class="btn btn-primary">🗂️ Репозитории</a>
                        <a href="keys.html?id=${projectId}" class="btn btn-primary">🔐 Ключи</a>
                    </div>
                </div>

                <div class="card mt-4">
                    <h3 style="margin-bottom: 20px;">⚙️ Настройки проекта</h3>

                    <form id="settings-form" onsubmit="saveSettings(event)">
                        <div class="form-group">
                            <label for="proj-name">Название проекта</label>
                            <input id="proj-name" type="text" class="form-control" value="${escapeHtml(project.name)}" required style="max-width:380px;">
                        </div>
                        <div class="form-group">
                            <label for="proj-parallel">Макс. параллельных задач <span style="color:var(--text-light); font-size:12px;">(0 = без ограничений)</span></label>
                            <input id="proj-parallel" type="number" min="0" class="form-control" value="${project.max_parallel_tasks || 0}" style="max-width:140px;">
                        </div>
                        <div class="form-group">
                            <label for="proj-telegram">Telegram Chat ID <span style="color:var(--text-light); font-size:12px;">(для алертов, необязательно)</span></label>
                            <input id="proj-telegram" type="text" class="form-control" value="${escapeHtml(project.telegram_chat || project.telegram_chat_id || '')}" placeholder="-1001234567890" style="max-width:280px;">
                        </div>
                        <div class="form-group">
                            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                                <input type="checkbox" id="proj-alerts" ${project.alert ? 'checked' : ''}>
                                Отправлять уведомления об ошибках задач
                            </label>
                        </div>
                        <div style="display:flex; gap:8px; align-items:center;">
                            <button type="submit" class="btn btn-primary">💾 Сохранить настройки</button>
                            <span id="settings-msg" style="font-size:13px;"></span>
                        </div>
                    </form>

                    <hr style="border:none; border-top:1px solid var(--border); margin:24px 0;">

                    <div style="margin-bottom:20px;">
                        <h4 style="margin-bottom:10px;">📦 Управление</h4>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            <button class="btn btn-sm" onclick="backupProject()">📥 Скачать резервную копию</button>
                        </div>
                    </div>

                    <hr style="border:none; border-top:1px solid var(--border); margin:20px 0;">
                    <div>
                        <h4 style="color:#c53030; margin-bottom:10px;">⚠️ Опасная зона</h4>
                        <p style="color:var(--text-light); font-size:14px; margin-bottom:12px;">Удаление проекта необратимо. Все шаблоны, задачи, ключи и настройки будут удалены.</p>
                        <button class="btn" style="background:#c53030; color:#fff;" onclick="confirmDeleteProject()">🗑️ Удалить проект</button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
