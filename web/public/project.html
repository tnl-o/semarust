<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проект - Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2 id="project-title">Загрузка...</h2>
            </div>

            <div class="main-body">
                <div id="project-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка проекта...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        // Получить ID проекта из URL
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        if (!projectId) {
            window.location.href = 'index.html';
        }

        // Загрузка проекта и статистики
        Promise.all([
            api.getProject(projectId),
            api.getPlaybooks(projectId).catch(() => []),
            api.getTemplates(projectId).catch(() => []),
            api.getInventories(projectId).catch(() => []),
            api.getEnvironments(projectId).catch(() => [])
        ])
        .then(([project, playbooks, templates, inventories, environments]) => {
            $('#project-title').textContent = project.name;
            document.title = project.name + ' - Velum';
            showProjectDashboard(project, { playbooks, templates, inventories, environments });
        })
        .catch(error => {
            ui.showError($('#project-content'), error.message);
        });

        async function renameProject() {
            const input = document.getElementById('project-name-input');
            const msg = document.getElementById('rename-msg');
            const name = input ? input.value.trim() : '';
            if (!name) { if (msg) msg.textContent = 'Название не может быть пустым'; return; }
            try {
                await api.updateProject(projectId, { name });
                document.getElementById('project-title').textContent = name;
                document.title = name + ' - Velum';
                if (msg) { msg.style.color = 'var(--success, green)'; msg.textContent = 'Сохранено'; }
            } catch (e) {
                if (msg) { msg.style.color = '#e74c3c'; msg.textContent = e.message; }
            }
        }

        async function saveSettings(e) {
            e.preventDefault();
            const name = document.getElementById('proj-name').value.trim();
            const parallel = parseInt(document.getElementById('proj-parallel').value) || 0;
            const telegram = document.getElementById('proj-telegram').value.trim() || null;
            const alert = document.getElementById('proj-alerts').checked;
            const msg = document.getElementById('settings-msg');
            try {
                await api.updateProject(projectId, {
                    name,
                    max_parallel_tasks: parallel,
                    telegram_chat: telegram,
                    alert
                });
                $('#project-title').textContent = name;
                document.title = name + ' - Velum';
                msg.style.color = '#276749';
                msg.textContent = 'Настройки сохранены';
                setTimeout(() => { msg.textContent = ''; }, 3000);
            } catch (err) {
                msg.style.color = '#c53030';
                msg.textContent = err.message;
            }
        }

        async function backupProject() {
            const btn = document.getElementById('btn-backup');
            try {
                if (btn) { btn.disabled = true; btn.textContent = 'Подготовка...'; }
                // Используем бэкенд endpoint для полного бэкапа
                const backup = await api.request(`/project/${projectId}/backup`, { method: 'GET' });
                const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
                const url  = URL.createObjectURL(blob);
                const a    = document.createElement('a');
                const ts   = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                a.href = url;
                a.download = 'velum-backup-' + projectId + '-' + ts + '.json';
                a.click();
                URL.revokeObjectURL(url);
                ui.showAlert('Резервная копия скачана', 'success');
            } catch (err) {
                ui.showAlert('Ошибка резервного копирования: ' + err.message, 'danger');
            } finally {
                if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-download"></i> Резервная копия'; }
            }
        }

        async function restoreProject() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const text = await file.text();
                let backup;
                try { backup = JSON.parse(text); } catch { ui.showAlert('Ошибка: файл не является JSON', 'danger'); return; }

                if (!confirm(`Восстановить проект из "${file.name}"?\nЭто добавит все сущности из бэкапа в текущий проект.`)) return;

                try {
                    const result = await api.request(`/project/${projectId}/backup`, {
                        method: 'POST',
                        body: JSON.stringify(backup)
                    });
                    const msg = `Восстановлено: ${result.templates || 0} шаблонов, ${result.inventories || 0} инвентарей, ${result.repositories || 0} репозиториев, ${result.environments || 0} окружений`;
                    if (result.errors && result.errors.length > 0) {
                        ui.showAlert(msg + ` (ошибки: ${result.errors.length})`, 'warning');
                    } else {
                        ui.showAlert(msg, 'success');
                    }
                } catch (err) {
                    ui.showAlert('Ошибка восстановления: ' + err.message, 'danger');
                }
            };
            input.click();
        }

        async function testProjectNotifications() {
            const btn = document.getElementById('btn-test-notify');
            if (!btn) return;
            const original = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Отправка...';
            try {
                await api.request('POST', `${API_BASE}/project/${projectId}/notifications/test`, {});
                ui.showAlert('Тестовое уведомление отправлено (проверьте канал алертов проекта)', 'success');
            } catch (err) {
                ui.showAlert('Не удалось отправить тестовое уведомление: ' + err.message, 'danger');
            } finally {
                btn.disabled = false;
                btn.textContent = original;
            }
        }

        async function clearGlobalCache() {
            const btn = document.getElementById('btn-clear-cache');
            if (!btn) return;
            if (!confirm('Очистить кэш приложения? Это может перезагрузить часть данных.')) return;
            const original = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Очистка...';
            try {
                await api.request('DELETE', `${API_BASE}/cache`, null);
                ui.showAlert('Кэш приложения очищен', 'success');
            } catch (err) {
                ui.showAlert('Не удалось очистить кэш: ' + err.message, 'danger');
            } finally {
                btn.disabled = false;
                btn.textContent = original;
            }
        }

        async function confirmDeleteProject() {
            if (!confirm('Удалить проект? Это действие необратимо.')) return;
            try {
                await api.deleteProject(projectId);
                window.location.href = 'index.html';
            } catch (e) {
                alert('Ошибка удаления: ' + e.message);
            }
        }

        function showProjectDashboard(project, stats) {
            const content = $('#project-content');
            content.innerHTML = `
                <div class="grid" style="margin-bottom: 30px;">
                    <div class="card text-center stat-card">
                        <div class="stat-icon" style="color:#1976d2;"><i class="fa-solid fa-book"></i></div>
                        <div class="stat-number">${stats.playbooks.length}</div>
                        <div class="stat-label">Playbooks</div>
                        <a href="playbooks.html?id=${projectId}" class="btn btn-primary btn-sm mt-2">Открыть</a>
                    </div>
                    <div class="card text-center stat-card">
                        <div class="stat-icon" style="color:#2e7d32;"><i class="fa-solid fa-list-check"></i></div>
                        <div class="stat-number">${stats.templates.length}</div>
                        <div class="stat-label">Шаблоны</div>
                        <a href="templates.html?id=${projectId}" class="btn btn-primary btn-sm mt-2">Открыть</a>
                    </div>
                    <div class="card text-center stat-card">
                        <div class="stat-icon" style="color:#e65100;"><i class="fa-solid fa-boxes-stacked"></i></div>
                        <div class="stat-number">${stats.inventories.length}</div>
                        <div class="stat-label">Инвентари</div>
                        <a href="inventory.html?id=${projectId}" class="btn btn-primary btn-sm mt-2">Открыть</a>
                    </div>
                    <div class="card text-center stat-card">
                        <div class="stat-icon" style="color:#6a1b9a;"><i class="fa-solid fa-leaf"></i></div>
                        <div class="stat-number">${stats.environments.length}</div>
                        <div class="stat-label">Окружения</div>
                        <a href="environments.html?id=${projectId}" class="btn btn-primary btn-sm mt-2">Открыть</a>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-bottom: 15px;">О проекте</h3>
                    <p style="color: var(--text-light); line-height: 1.8;">
                        ${escapeHtml(project.description || 'Нет описания')}
                    </p>
                    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);">
                        <div style="display: flex; gap: 30px; color: var(--text-light); font-size: 14px;">
                            <div><strong>ID:</strong> ${project.id}</div>
                            <div><strong>Создан:</strong> ${formatDate(project.created)}</div>
                        </div>
                    </div>
                </div>

                <div class="card mt-4">
                    <h3 style="margin-bottom: 15px;">Быстрый доступ</h3>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <a href="playbooks.html?id=${projectId}" class="btn btn-primary"><i class="fa-solid fa-book"></i> Playbooks</a>
                        <a href="templates.html?id=${projectId}" class="btn btn-primary"><i class="fa-solid fa-list-check"></i> Шаблоны</a>
                        <a href="inventory.html?id=${projectId}" class="btn btn-primary"><i class="fa-solid fa-boxes-stacked"></i> Инвентарь</a>
                        <a href="environments.html?id=${projectId}" class="btn btn-primary"><i class="fa-solid fa-leaf"></i> Окружения</a>
                        <a href="repositories.html?id=${projectId}" class="btn btn-primary"><i class="fa-solid fa-code-branch"></i> Репозитории</a>
                        <a href="keys.html?id=${projectId}" class="btn btn-primary"><i class="fa-solid fa-key"></i> Ключи</a>
                    </div>
                </div>

                <div class="card mt-4">
                    <h3 style="margin-bottom: 20px;"><i class="fa-solid fa-gear" style="color:var(--text-muted); margin-right:8px;"></i>Настройки проекта</h3>

                    <form id="settings-form" onsubmit="saveSettings(event)">
                        <div class="form-group">
                            <label for="proj-name">Название проекта</label>
                            <input id="proj-name" type="text" class="form-control" value="${escapeHtml(project.name)}" required style="max-width:380px;">
                        </div>
                        <div class="form-group">
                            <label for="proj-parallel">Макс. параллельных задач <span style="color:var(--text-light); font-size:12px;">(0 = без ограничений)</span></label>
                            <input id="proj-parallel" type="number" min="0" class="form-control" value="${project.max_parallel_tasks || 0}" style="max-width:140px;">
                        </div>
                        <div class="form-group">
                            <label for="proj-telegram">Telegram Chat ID <span style="color:var(--text-light); font-size:12px;">(для алертов, необязательно)</span></label>
                            <input id="proj-telegram" type="text" class="form-control" value="${escapeHtml(project.telegram_chat || project.telegram_chat_id || '')}" placeholder="-1001234567890" style="max-width:280px;">
                        </div>
                        <div class="form-group">
                            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                                <input type="checkbox" id="proj-alerts" ${project.alert ? 'checked' : ''}>
                                Отправлять уведомления об ошибках задач
                            </label>
                        </div>
                        <div style="display:flex; gap:8px; align-items:center;">
                            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Сохранить настройки</button>
                            <span id="settings-msg" style="font-size:13px;"></span>
                        </div>
                    </form>

                    <hr style="border:none; border-top:1px solid var(--border); margin:24px 0;">

                    <div style="margin-bottom:20px;">
                        <h4 style="margin-bottom:10px;"><i class="fa-solid fa-database" style="color:var(--text-muted); margin-right:6px;"></i>Управление</h4>
                        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                            <button id="btn-backup" class="btn btn-sm" onclick="backupProject()"><i class="fa-solid fa-download"></i> Резервная копия</button>
                            <button class="btn btn-sm" onclick="restoreProject()"><i class="fa-solid fa-upload"></i> Восстановить</button>
                        </div>
                    </div>

                    <hr style="border:none; border-top:1px solid var(--border); margin:20px 0;">

                    <div style="margin-bottom:20px;">
                        <h4 style="margin-bottom:10px;"><i class="fa-solid fa-bell" style="color:var(--text-muted); margin-right:6px;"></i>Тест и обслуживание</h4>
                        <p style="color:var(--text-light); font-size:13px; margin-bottom:10px;">
                            Эти действия помогают проверить настройки уведомлений и очистить внутренний кэш.
                        </p>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;">
                            <button id="btn-test-notify" class="btn btn-sm" onclick="testProjectNotifications()"><i class="fa-solid fa-bell"></i> Тест уведомлений</button>
                            <button id="btn-clear-cache" class="btn btn-sm" onclick="clearGlobalCache()"><i class="fa-solid fa-broom"></i> Очистить кэш</button>
                        </div>
                    </div>

                    <hr style="border:none; border-top:1px solid var(--border); margin:20px 0;">
                    <div>
                        <h4 style="color:#c53030; margin-bottom:10px;"><i class="fa-solid fa-triangle-exclamation" style="margin-right:6px;"></i>Опасная зона</h4>
                        <p style="color:var(--text-light); font-size:14px; margin-bottom:12px;">Удаление проекта необратимо. Все шаблоны, задачи, ключи и настройки будут удалены.</p>
                        <button class="btn" style="background:#c53030; color:#fff;" onclick="confirmDeleteProject()"><i class="fa-solid fa-trash"></i> Удалить проект</button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
