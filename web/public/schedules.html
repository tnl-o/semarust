<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписания - Velum</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <style>
        .cron-group { margin-bottom: 14px; }
        .cron-group-label { font-size: 12px; font-weight: 500; color: var(--text-light); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .cron-checkboxes { display: flex; flex-wrap: wrap; gap: 4px; }
        .cron-cb-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .cron-cb-item label { font-size: 11px; color: var(--text-light); cursor: pointer; }
        .cron-cb-item input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary-color); }
        .cron-quick-btn { padding: 2px 7px; font-size: 11px; border: 1px solid var(--border-color); border-radius: 3px; background: none; cursor: pointer; color: var(--text-light); }
        .cron-quick-btn:hover { background: var(--hover-bg); }
        .mode-toggle { display: flex; gap: 0; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; margin-bottom: 16px; width: fit-content; }
        .mode-toggle button { padding: 6px 16px; border: none; background: none; cursor: pointer; font-size: 13px; }
        .mode-toggle button.active { background: var(--primary-color); color: #fff; }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2 id="project-title">Расписания</h2>
                <button class="btn btn-primary" onclick="openScheduleModal()">+ Новое расписание</button>
            </div>

            <div class="main-body">
                <div id="schedules-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка расписаний...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Schedule Modal -->
    <div id="schedule-modal" class="modal-overlay" style="display:none;">
        <div class="modal" style="max-width:680px; max-height:90vh; overflow-y:auto;">
            <div class="modal-header">
                <h3 id="sched-modal-title">Новое расписание</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="sched-id">

                <div class="form-group">
                    <label for="sched-name">Название *</label>
                    <input type="text" id="sched-name" class="form-control" required placeholder="Ежедневный бэкап">
                </div>

                <div class="form-group">
                    <label for="sched-template">Шаблон *</label>
                    <select id="sched-template" class="form-control" required>
                        <option value="">— Выберите шаблон —</option>
                    </select>
                </div>

                <!-- Mode toggle -->
                <div class="form-group">
                    <label>Режим запуска</label>
                    <div class="mode-toggle">
                        <button id="mode-cron-btn" class="active" onclick="setMode('cron')">↻ Повторяющееся (cron)</button>
                        <button id="mode-once-btn" onclick="setMode('run_at')">▶ Одноразовый запуск</button>
                    </div>
                </div>

                <!-- Cron mode -->
                <div id="cron-section">
                    <!-- Quick presets -->
                    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;">
                        <button type="button" class="btn btn-sm btn-secondary" onclick="applyPreset('0 * * * *')">Каждый час</button>
                        <button type="button" class="btn btn-sm btn-secondary" onclick="applyPreset('0 9 * * *')">Каждый день в 9:00</button>
                        <button type="button" class="btn btn-sm btn-secondary" onclick="applyPreset('0 9 * * 1')">Каждый понедельник</button>
                        <button type="button" class="btn btn-sm btn-secondary" onclick="applyPreset('0 9 1 * *')">Первое число месяца</button>
                        <button type="button" class="btn btn-sm btn-secondary" onclick="applyPreset('*/5 * * * *')">Каждые 5 мин</button>
                    </div>

                    <!-- Minutes -->
                    <div class="cron-group">
                        <div class="cron-group-label">
                            Минуты
                            <button type="button" class="cron-quick-btn" onclick="selectAll('min')">Все</button>
                            <button type="button" class="cron-quick-btn" onclick="selectNone('min')">Ни одной</button>
                            <button type="button" class="cron-quick-btn" onclick="selectEveryN('min',5)">каждые 5</button>
                            <button type="button" class="cron-quick-btn" onclick="selectEveryN('min',15)">каждые 15</button>
                            <button type="button" class="cron-quick-btn" onclick="selectEveryN('min',30)">каждые 30</button>
                        </div>
                        <div class="cron-checkboxes" id="cb-min"></div>
                    </div>

                    <!-- Hours -->
                    <div class="cron-group">
                        <div class="cron-group-label">
                            Часы
                            <button type="button" class="cron-quick-btn" onclick="selectAll('hour')">Все</button>
                            <button type="button" class="cron-quick-btn" onclick="selectNone('hour')">Ни одного</button>
                            <button type="button" class="cron-quick-btn" onclick="selectEveryN('hour',6)">каждые 6ч</button>
                            <button type="button" class="cron-quick-btn" onclick="selectEveryN('hour',12)">каждые 12ч</button>
                        </div>
                        <div class="cron-checkboxes" id="cb-hour"></div>
                    </div>

                    <!-- Days of month -->
                    <div class="cron-group">
                        <div class="cron-group-label">
                            Дни месяца
                            <button type="button" class="cron-quick-btn" onclick="selectAll('dom')">Все</button>
                            <button type="button" class="cron-quick-btn" onclick="selectNone('dom')">Ни одного</button>
                        </div>
                        <div class="cron-checkboxes" id="cb-dom"></div>
                    </div>

                    <!-- Months -->
                    <div class="cron-group">
                        <div class="cron-group-label">
                            Месяцы
                            <button type="button" class="cron-quick-btn" onclick="selectAll('mon')">Все</button>
                            <button type="button" class="cron-quick-btn" onclick="selectNone('mon')">Ни одного</button>
                        </div>
                        <div class="cron-checkboxes" id="cb-mon"></div>
                    </div>

                    <!-- Days of week -->
                    <div class="cron-group">
                        <div class="cron-group-label">
                            Дни недели
                            <button type="button" class="cron-quick-btn" onclick="selectAll('dow')">Все</button>
                            <button type="button" class="cron-quick-btn" onclick="selectNone('dow')">Ни одного</button>
                        </div>
                        <div class="cron-checkboxes" id="cb-dow"></div>
                    </div>

                    <!-- Cron expression -->
                    <div class="form-group">
                        <label for="sched-cron">Cron выражение (редактировать вручную)</label>
                        <input type="text" id="sched-cron" class="form-control" placeholder="0 9 * * *"
                            style="font-family:monospace;" oninput="onCronTextInput()">
                        <small id="cron-hint" style="color:var(--text-light); display:block; margin-top:4px;"></small>
                    </div>
                </div>

                <!-- Run-at mode -->
                <div id="run-at-section" style="display:none;">
                    <div class="form-group">
                        <label for="sched-run-at">Дата и время запуска *</label>
                        <input type="datetime-local" id="sched-run-at" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="sched-delete-after">
                            Удалить расписание после выполнения
                        </label>
                    </div>
                </div>

                <!-- Extra params (collapse) -->
                <div style="margin-top:10px;">
                    <button type="button" class="btn btn-sm btn-secondary" onclick="toggleParams()"
                        id="params-toggle-btn">▸ Параметры запуска</button>
                    <div id="params-section" style="display:none; margin-top:10px; padding:12px; background:var(--bg-secondary,#f5f5f5); border-radius:4px;">
                        <div class="form-group">
                            <label for="sched-branch">Ветка Git (оставить пустым = из шаблона)</label>
                            <input type="text" id="sched-branch" class="form-control" placeholder="main">
                        </div>
                        <div class="form-group">
                            <label for="sched-env">Переопределить окружение</label>
                            <select id="sched-env" class="form-control">
                                <option value="">— использовать из шаблона —</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group" style="margin-top:14px;">
                    <label>
                        <input type="checkbox" id="sched-active" checked>
                        Расписание активно
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
                <button class="btn btn-primary" onclick="saveSchedule()">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        if (!projectId) window.location.href = 'index.html';

        let schedules = [];
        let templates = [];
        let environments = [];
        let currentMode = 'cron';

        // ── Init ────────────────────────────────────────────────────────────
        api.getProject(projectId)
            .then(p => {
                document.getElementById('project-title').textContent = p.name + ' → Расписания';
                document.title = 'Расписания — ' + p.name;
            }).catch(() => {});

        Promise.all([
            api.get(`${API_BASE}/project/${projectId}/templates`).then(d => templates = d || []).catch(() => {}),
            api.get(`${API_BASE}/project/${projectId}/environments`).then(d => environments = d || []).catch(() => {}),
        ]).then(() => loadSchedules());

        // ── Load & render ───────────────────────────────────────────────────
        function loadSchedules() {
            api.get(`${API_BASE}/project/${projectId}/schedules`)
                .then(data => {
                    schedules = data || [];
                    renderSchedules();
                })
                .catch(err => {
                    document.getElementById('schedules-content').innerHTML =
                        `<div class="alert alert-danger">Ошибка: ${escapeHtml(err.message)}</div>`;
                });
        }

        function renderSchedules() {
            const el = document.getElementById('schedules-content');
            if (!schedules.length) {
                el.innerHTML = `
                    <div class="card text-center">
                        <div style="font-size:48px;margin-bottom:15px"><i class="fa-solid fa-clock" style="color:var(--primary-dark);"></i></div>
                        <h3>Нет расписаний</h3>
                        <p style="color:var(--text-light)">Создайте расписание для автоматического запуска задач</p>
                        <button class="btn btn-primary mt-3" onclick="openScheduleModal()">Создать расписание</button>
                    </div>`;
                return;
            }

            el.innerHTML = `
                <div class="card">
                    <table class="table">
                        <thead><tr>
                            <th>Название</th>
                            <th>Шаблон</th>
                            <th>Расписание</th>
                            <th>Активно</th>
                            <th>Создано</th>
                            <th style="width:140px">Действия</th>
                        </tr></thead>
                        <tbody>
                            ${schedules.map(s => {
                                const tpl = templates.find(t => t.id === s.template_id);
                                const isRunAt = s.cron_format === 'run_at';
                                const schedLabel = isRunAt
                                    ? `<span class="badge badge-info">Одноразовый: ${escapeHtml(s.run_at || '')}</span>`
                                    : `<code style="font-size:12px">${escapeHtml(s.cron)}</code>`;
                                return `<tr>
                                    <td><strong>${escapeHtml(s.name)}</strong></td>
                                    <td>${tpl ? escapeHtml(tpl.name) : 'ID:' + s.template_id}</td>
                                    <td>${schedLabel}</td>
                                    <td><span class="badge badge-${s.active ? 'success' : 'secondary'}">${s.active ? 'Активно' : 'Выключено'}</span></td>
                                    <td>${s.created ? formatDate(s.created) : '—'}</td>
                                    <td>
                                        <button class="btn btn-sm btn-secondary" onclick="editSchedule(${s.id})" title="Редактировать"><i class="fa-solid fa-pen"></i></button>
                                        <button class="btn btn-sm btn-${s.active ? 'warning' : 'success'}" onclick="toggleSchedule(${s.id}, ${!s.active})" title="${s.active ? 'Выключить' : 'Включить'}">${s.active ? '<i class="fa-solid fa-pause"></i>' : '<i class="fa-solid fa-play"></i>'}</button>
                                        <button class="btn btn-sm btn-danger" onclick="deleteSchedule(${s.id})" title="Удалить"><i class="fa-solid fa-trash"></i></button>
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        // ── CRUD ────────────────────────────────────────────────────────────
        function editSchedule(id) {
            const s = schedules.find(x => x.id === id);
            if (!s) return;
            openScheduleModal(s);
        }

        function toggleSchedule(id, active) {
            const s = schedules.find(x => x.id === id);
            if (!s) return;
            api.request('PUT', `${API_BASE}/project/${projectId}/schedules/${id}`, { ...s, active })
                .then(() => loadSchedules())
                .catch(err => alert('Ошибка: ' + err.message));
        }

        function deleteSchedule(id) {
            if (!confirm('Удалить это расписание?')) return;
            api.request('DELETE', `${API_BASE}/project/${projectId}/schedules/${id}`)
                .then(() => {
                    loadSchedules();
                    notify('Расписание удалено', 'success');
                })
                .catch(err => alert('Ошибка: ' + err.message));
        }

        // ── Modal ───────────────────────────────────────────────────────────
        function openScheduleModal(sched = null) {
            const isEdit = !!sched;
            document.getElementById('sched-modal-title').textContent = isEdit ? 'Редактировать расписание' : 'Новое расписание';
            document.getElementById('sched-id').value = sched ? sched.id : '';
            document.getElementById('sched-name').value = sched ? sched.name : '';
            document.getElementById('sched-active').checked = sched ? sched.active !== false : true;
            document.getElementById('sched-branch').value = '';
            document.getElementById('params-section').style.display = 'none';
            document.getElementById('params-toggle-btn').textContent = '▸ Параметры запуска';

            // Populate template select
            const tplSel = document.getElementById('sched-template');
            tplSel.innerHTML = '<option value="">— Выберите шаблон —</option>' +
                templates.map(t => `<option value="${t.id}" ${sched && t.id === sched.template_id ? 'selected' : ''}>${escapeHtml(t.name)}</option>`).join('');

            // Populate env select
            const envSel = document.getElementById('sched-env');
            envSel.innerHTML = '<option value="">— использовать из шаблона —</option>' +
                environments.map(e => `<option value="${e.id}">${escapeHtml(e.name)}</option>`).join('');

            // Build cron checkboxes
            buildCheckboxes();

            // Determine mode
            const mode = sched && sched.cron_format === 'run_at' ? 'run_at' : 'cron';
            setMode(mode);

            if (mode === 'run_at') {
                if (sched && sched.run_at) {
                    // Convert to datetime-local format (strip Z/timezone)
                    const dt = sched.run_at.replace('Z', '').substring(0, 16);
                    document.getElementById('sched-run-at').value = dt;
                }
                document.getElementById('sched-delete-after').checked = sched ? !!sched.delete_after_run : false;
            } else if (sched && sched.cron) {
                setCronFromExpression(sched.cron);
            }

            document.getElementById('schedule-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('schedule-modal').style.display = 'none';
        }

        function toggleParams() {
            const sec = document.getElementById('params-section');
            const btn = document.getElementById('params-toggle-btn');
            const open = sec.style.display === 'none';
            sec.style.display = open ? '' : 'none';
            btn.textContent = open ? '▾ Параметры запуска' : '▸ Параметры запуска';
        }

        function saveSchedule() {
            const id = document.getElementById('sched-id').value;
            const name = document.getElementById('sched-name').value.trim();
            const templateId = document.getElementById('sched-template').value;
            const active = document.getElementById('sched-active').checked;
            const branchOverride = document.getElementById('sched-branch').value.trim();
            const envOverride = document.getElementById('sched-env').value;

            if (!name || !templateId) {
                alert('Заполните название и шаблон');
                return;
            }

            let payload = {
                id: id ? parseInt(id) : 0,
                project_id: parseInt(projectId),
                name,
                template_id: parseInt(templateId),
                active,
                cron_format: currentMode === 'run_at' ? 'run_at' : null,
            };

            // Параметры запуска (task_params внутри расписания)
            if (branchOverride) {
                payload.git_branch = branchOverride;
            }
            if (envOverride) {
                payload.environment_id = parseInt(envOverride, 10);
            }

            if (currentMode === 'run_at') {
                const runAt = document.getElementById('sched-run-at').value;
                if (!runAt) { alert('Выберите дату и время запуска'); return; }
                payload.cron = '';
                payload.run_at = runAt + ':00Z';
                payload.delete_after_run = document.getElementById('sched-delete-after').checked;
            } else {
                const cron = document.getElementById('sched-cron').value.trim();
                if (!cron || cron.split(/\s+/).length !== 5) {
                    alert('Введите корректное cron выражение (5 полей)');
                    return;
                }
                payload.cron = cron;
                payload.run_at = null;
                payload.delete_after_run = false;
            }

            const method = id ? 'PUT' : 'POST';
            const url = id
                ? `${API_BASE}/project/${projectId}/schedules/${id}`
                : `${API_BASE}/project/${projectId}/schedules`;

            api.request(method, url, payload)
                .then(() => {
                    closeModal();
                    loadSchedules();
                    notify(`Расписание ${id ? 'обновлено' : 'создано'}`, 'success');
                })
                .catch(err => alert('Ошибка: ' + err.message));
        }

        // ── Mode switch ─────────────────────────────────────────────────────
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('cron-section').style.display = mode === 'cron' ? '' : 'none';
            document.getElementById('run-at-section').style.display = mode === 'run_at' ? '' : 'none';
            document.getElementById('mode-cron-btn').classList.toggle('active', mode === 'cron');
            document.getElementById('mode-once-btn').classList.toggle('active', mode === 'run_at');
        }

        // ── Cron builder ────────────────────────────────────────────────────
        const MONTH_NAMES = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
        const DOW_NAMES   = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

        function buildCheckboxes() {
            buildGroup('cb-min',  60, i => i.toString().padStart(2,'0'), 'min');
            buildGroup('cb-hour', 24, i => i.toString().padStart(2,'0'), 'hour');
            buildGroup('cb-dom',  31, i => (i+1).toString(), 'dom', 1);
            buildMonths();
            buildDow();
        }

        function buildGroup(containerId, count, labelFn, prefix, startFrom = 0) {
            const el = document.getElementById(containerId);
            if (!el) return;
            el.innerHTML = '';
            for (let i = startFrom; i < count + startFrom; i++) {
                const id = `cb-${prefix}-${i}`;
                const item = document.createElement('div');
                item.className = 'cron-cb-item';
                item.innerHTML = `<input type="checkbox" id="${id}" data-group="${prefix}" data-val="${i}" onchange="rebuildCronFromCheckboxes()">
                    <label for="${id}">${labelFn(i)}</label>`;
                el.appendChild(item);
            }
        }

        function buildMonths() {
            const el = document.getElementById('cb-mon');
            if (!el) return;
            el.innerHTML = '';
            MONTH_NAMES.forEach((name, i) => {
                const val = i + 1;
                const id = `cb-mon-${val}`;
                const item = document.createElement('div');
                item.className = 'cron-cb-item';
                item.innerHTML = `<input type="checkbox" id="${id}" data-group="mon" data-val="${val}" onchange="rebuildCronFromCheckboxes()">
                    <label for="${id}">${name}</label>`;
                el.appendChild(item);
            });
        }

        function buildDow() {
            const el = document.getElementById('cb-dow');
            if (!el) return;
            el.innerHTML = '';
            DOW_NAMES.forEach((name, i) => {
                const id = `cb-dow-${i}`;
                const item = document.createElement('div');
                item.className = 'cron-cb-item';
                item.innerHTML = `<input type="checkbox" id="${id}" data-group="dow" data-val="${i}" onchange="rebuildCronFromCheckboxes()">
                    <label for="${id}">${name}</label>`;
                el.appendChild(item);
            });
        }

        function selectAll(group) {
            document.querySelectorAll(`[data-group="${group}"]`).forEach(cb => cb.checked = true);
            rebuildCronFromCheckboxes();
        }

        function selectNone(group) {
            document.querySelectorAll(`[data-group="${group}"]`).forEach(cb => cb.checked = false);
            rebuildCronFromCheckboxes();
        }

        function selectEveryN(group, n) {
            document.querySelectorAll(`[data-group="${group}"]`).forEach(cb => {
                cb.checked = parseInt(cb.dataset.val) % n === 0;
            });
            rebuildCronFromCheckboxes();
        }

        function getCheckedVals(group, maxAll) {
            const cbs = [...document.querySelectorAll(`[data-group="${group}"]`)];
            const checked = cbs.filter(cb => cb.checked).map(cb => parseInt(cb.dataset.val));
            if (checked.length === 0 || checked.length === cbs.length) return '*';
            return checked.join(',');
        }

        function rebuildCronFromCheckboxes() {
            const min  = getCheckedVals('min',  60);
            const hour = getCheckedVals('hour', 24);
            const dom  = getCheckedVals('dom',  31);
            const mon  = getCheckedVals('mon',  12);
            const dow  = getCheckedVals('dow',   7);
            const expr = `${min} ${hour} ${dom} ${mon} ${dow}`;
            document.getElementById('sched-cron').value = expr;
            updateCronHint(expr);
        }

        function setCronFromExpression(expr) {
            document.getElementById('sched-cron').value = expr;
            const parts = expr.trim().split(/\s+/);
            if (parts.length !== 5) return;
            const [minPart, hourPart, domPart, monPart, dowPart] = parts;
            applyPartToCheckboxes('min',  minPart,  0);
            applyPartToCheckboxes('hour', hourPart, 0);
            applyPartToCheckboxes('dom',  domPart,  1);
            applyPartToCheckboxes('mon',  monPart,  1);
            applyPartToCheckboxes('dow',  dowPart,  0);
            updateCronHint(expr);
        }

        function applyPartToCheckboxes(group, part, startFrom) {
            const cbs = document.querySelectorAll(`[data-group="${group}"]`);
            if (part === '*') {
                cbs.forEach(cb => cb.checked = false);
                return;
            }
            // Parse: "1,3,5" or "*/5" or "1-5" or single number
            const allVals = [];
            if (part.startsWith('*/')) {
                const step = parseInt(part.slice(2));
                cbs.forEach(cb => { const v = parseInt(cb.dataset.val); if (v % step === 0) allVals.push(v); });
            } else if (part.includes('-')) {
                const [from, to] = part.split('-').map(Number);
                for (let i = from; i <= to; i++) allVals.push(i);
            } else {
                part.split(',').forEach(v => allVals.push(parseInt(v)));
            }
            cbs.forEach(cb => cb.checked = allVals.includes(parseInt(cb.dataset.val)));
        }

        function onCronTextInput() {
            const expr = document.getElementById('sched-cron').value;
            const parts = expr.trim().split(/\s+/);
            if (parts.length === 5) setCronFromExpression(expr);
            else updateCronHint(expr);
        }

        function applyPreset(expr) {
            setCronFromExpression(expr);
        }

        function updateCronHint(expr) {
            const hint = document.getElementById('cron-hint');
            if (!hint) return;
            const parts = expr.trim().split(/\s+/);
            if (parts.length !== 5) { hint.textContent = ''; return; }
            const [m, h, dom, mon, dow] = parts;
            if (expr === '0 * * * *') { hint.textContent = 'Каждый час'; return; }
            if (expr === '*/5 * * * *') { hint.textContent = 'Каждые 5 минут'; return; }
            const days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
            if (dom === '*' && mon === '*' && dow === '*') {
                hint.textContent = `Каждый день в ${h.padStart(2,'0')}:${m.padStart(2,'0')}`;
            } else if (dom === '*' && mon === '*') {
                hint.textContent = `Каждую неделю в ${days[parseInt(dow)] || dow}, ${h.padStart(2,'0')}:${m.padStart(2,'0')}`;
            } else if (dom !== '*' && mon === '*') {
                hint.textContent = `${dom}-го числа каждого месяца в ${h.padStart(2,'0')}:${m.padStart(2,'0')}`;
            } else {
                hint.textContent = '';
            }
        }

        // ── Utilities ───────────────────────────────────────────────────────
        function notify(message, type = 'info') {
            const el = document.createElement('div');
            el.className = `alert alert-${type}`;
            el.textContent = message;
            Object.assign(el.style, { position:'fixed', top:'20px', right:'20px', zIndex:'10000', minWidth:'280px' });
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        window.onclick = e => {
            if (e.target === document.getElementById('schedule-modal')) closeModal();
        };
    </script>
</body>
</html>
