<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интеграции - Velum</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2 id="project-title">Интеграции</h2>
                <button class="btn btn-primary" id="add-btn" onclick="openCreateModal()">+ Добавить интеграцию</button>
            </div>

            <!-- Tabs -->
            <div style="border-bottom: 2px solid var(--border-color); margin: 0 20px;">
                <button class="tab-btn active" id="tab-integrations" onclick="switchTab('integrations')"
                    style="padding: 10px 20px; border: none; background: none; cursor: pointer; font-size: 14px; border-bottom: 2px solid var(--primary-color); margin-bottom: -2px; color: var(--primary-color); font-weight: 500;">
                    Интеграции
                </button>
                <button class="tab-btn" id="tab-aliases" onclick="switchTab('aliases')"
                    style="padding: 10px 20px; border: none; background: none; cursor: pointer; font-size: 14px; color: var(--text-light);">
                    Алиасы
                </button>
            </div>

            <div class="main-body">
                <!-- Integrations Tab -->
                <div id="content-integrations">
                    <div id="integrations-list">
                        <div class="loading">
                            <div class="loading-spinner"></div>
                            <p>Загрузка интеграций...</p>
                        </div>
                    </div>
                </div>

                <!-- Aliases Tab -->
                <div id="content-aliases" style="display:none;">
                    <div class="main-header" style="padding: 0; margin-bottom: 15px;">
                        <span></span>
                        <button class="btn btn-primary btn-sm" onclick="openAliasModal()">+ Добавить алиас</button>
                    </div>
                    <div id="aliases-list">
                        <div class="loading">
                            <div class="loading-spinner"></div>
                            <p>Загрузка алиасов...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create/Edit Integration Modal -->
    <div id="integration-modal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width: 560px;">
            <div class="modal-header">
                <h3 id="modal-title">Создать интеграцию</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="integration-form">
                    <input type="hidden" id="int-id">

                    <div class="form-group">
                        <label for="int-name">Название *</label>
                        <input type="text" id="int-name" class="form-control" required placeholder="My Webhook">
                    </div>

                    <div class="form-group">
                        <label for="int-template">Шаблон *</label>
                        <select id="int-template" class="form-control" required>
                            <option value="">— Выберите шаблон —</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="int-auth-method">Метод аутентификации</label>
                        <select id="int-auth-method" class="form-control" onchange="onAuthMethodChange()">
                            <option value="none">Нет</option>
                            <option value="hmac">HMAC</option>
                            <option value="token">Token</option>
                        </select>
                    </div>

                    <div id="auth-header-group" class="form-group" style="display:none;">
                        <label for="int-auth-header">Заголовок аутентификации</label>
                        <input type="text" id="int-auth-header" class="form-control" placeholder="X-Hub-Signature-256">
                    </div>

                    <div id="auth-secret-group" class="form-group" style="display:none;">
                        <label for="int-auth-secret">Ключ (Secret)</label>
                        <select id="int-auth-secret" class="form-control">
                            <option value="">— Выберите ключ —</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
                <button class="btn btn-primary" onclick="saveIntegration()">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Create Alias Modal -->
    <div id="alias-modal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width: 480px;">
            <div class="modal-header">
                <h3>Добавить алиас</h3>
                <button class="modal-close" onclick="closeAliasModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="alias-integration">Интеграция *</label>
                    <select id="alias-integration" class="form-control" required>
                        <option value="">— Выберите интеграцию —</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="alias-value">Алиас *</label>
                    <input type="text" id="alias-value" class="form-control" required placeholder="my-webhook-alias">
                    <small style="color: var(--text-light);">Уникальный URL-идентификатор для этой интеграции</small>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAliasModal()">Отмена</button>
                <button class="btn btn-primary" onclick="saveAlias()">Создать</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        if (!projectId) window.location.href = 'index.html';

        let integrations = [];
        let templates = [];
        let keys = [];
        let aliases = [];

        // ── Tabs ────────────────────────────────────────────────────────────
        function switchTab(tab) {
            document.getElementById('content-integrations').style.display = tab === 'integrations' ? '' : 'none';
            document.getElementById('content-aliases').style.display = tab === 'aliases' ? '' : 'none';

            document.getElementById('tab-integrations').style.borderBottom = tab === 'integrations' ? '2px solid var(--primary-color)' : 'none';
            document.getElementById('tab-integrations').style.color = tab === 'integrations' ? 'var(--primary-color)' : 'var(--text-light)';
            document.getElementById('tab-integrations').style.fontWeight = tab === 'integrations' ? '500' : 'normal';

            document.getElementById('tab-aliases').style.borderBottom = tab === 'aliases' ? '2px solid var(--primary-color)' : 'none';
            document.getElementById('tab-aliases').style.color = tab === 'aliases' ? 'var(--primary-color)' : 'var(--text-light)';
            document.getElementById('tab-aliases').style.fontWeight = tab === 'aliases' ? '500' : 'normal';

            document.getElementById('add-btn').textContent = tab === 'integrations' ? '+ Добавить интеграцию' : '+ Добавить алиас';
            document.getElementById('add-btn').onclick = tab === 'integrations' ? openCreateModal : openAliasModal;

            if (tab === 'aliases' && aliases.length === 0) loadAliases();
        }

        // ── Load data ───────────────────────────────────────────────────────
        function loadIntegrations() {
            api.get(`${API_BASE}/project/${projectId}/integrations`)
                .then(data => {
                    integrations = data || [];
                    renderIntegrations();
                })
                .catch(err => {
                    document.getElementById('integrations-list').innerHTML =
                        `<div class="alert alert-danger">Ошибка загрузки: ${escapeHtml(err.message)}</div>`;
                });
        }

        function loadAliases() {
            api.get(`${API_BASE}/project/${projectId}/integrations/aliases`)
                .then(data => {
                    aliases = data || [];
                    renderAliases();
                })
                .catch(err => {
                    document.getElementById('aliases-list').innerHTML =
                        `<div class="alert alert-danger">Ошибка загрузки алиасов: ${escapeHtml(err.message)}</div>`;
                });
        }

        function loadTemplates() {
            return api.get(`${API_BASE}/project/${projectId}/templates`)
                .then(data => { templates = data || []; })
                .catch(() => { templates = []; });
        }

        function loadKeys() {
            return api.get(`${API_BASE}/project/${projectId}/keys`)
                .then(data => { keys = data || []; })
                .catch(() => { keys = []; });
        }

        // ── Render integrations ─────────────────────────────────────────────
        function renderIntegrations() {
            const el = document.getElementById('integrations-list');
            if (integrations.length === 0) {
                el.innerHTML = `
                    <div class="card text-center">
                        <div style="font-size:48px;margin-bottom:15px;">🔗</div>
                        <h3>Нет интеграций</h3>
                        <p style="color:var(--text-light)">Создайте входящий webhook для запуска задач из внешних систем</p>
                        <button class="btn btn-primary mt-3" onclick="openCreateModal()">Создать интеграцию</button>
                    </div>`;
                return;
            }

            const webhookBase = `${location.protocol}//${location.host}/api/project/${projectId}/integrations`;

            el.innerHTML = `
                <div class="card">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Название</th>
                                <th>Шаблон</th>
                                <th>Аутентификация</th>
                                <th>Webhook URL</th>
                                <th style="width:160px">Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${integrations.map(i => {
                                const tpl = templates.find(t => t.id === i.template_id);
                                const authBadge = i.auth_method === 'hmac'
                                    ? '<span class="badge badge-warning">HMAC</span>'
                                    : i.auth_method === 'token'
                                        ? '<span class="badge badge-info">Token</span>'
                                        : '<span class="badge badge-secondary">Нет</span>';
                                const url = `${webhookBase}/${i.id}`;
                                return `<tr>
                                    <td><strong>${escapeHtml(i.name)}</strong></td>
                                    <td>${tpl ? escapeHtml(tpl.name) : '<span style="color:var(--text-light)">—</span>'}</td>
                                    <td>${authBadge}</td>
                                    <td>
                                        <span style="font-family:monospace;font-size:12px;color:var(--text-light)">${escapeHtml(url)}</span>
                                        <button class="btn btn-sm btn-secondary" onclick="copyUrl('${escapeHtml(url)}')" title="Копировать URL" style="padding:2px 6px;font-size:11px;">⧉</button>
                                    </td>
                                    <td>
                                        <button class="btn btn-sm btn-secondary" onclick="editIntegration(${i.id})" title="Редактировать">✎</button>
                                        <a href="integration_detail.html?id=${projectId}&integration=${i.id}" class="btn btn-sm btn-primary" title="Матчеры/Алиасы">⚙</a>
                                        <button class="btn btn-sm btn-danger" onclick="deleteIntegration(${i.id})" title="Удалить">🗑</button>
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        // ── Render aliases ──────────────────────────────────────────────────
        function renderAliases() {
            const el = document.getElementById('aliases-list');
            if (aliases.length === 0) {
                el.innerHTML = `
                    <div class="card text-center">
                        <div style="font-size:40px;margin-bottom:12px;">🔀</div>
                        <h3>Нет алиасов</h3>
                        <p style="color:var(--text-light)">Создайте уникальные URL-псевдонимы для интеграций</p>
                    </div>`;
                return;
            }

            const baseUrl = `${location.protocol}//${location.host}/api/project/${projectId}/integrations/aliases/`;

            el.innerHTML = `
                <div class="card">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Алиас</th>
                                <th>Интеграция</th>
                                <th>URL</th>
                                <th style="width:100px">Действия</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${aliases.map(a => {
                                const integration = integrations.find(i => i.id === a.integration_id);
                                const url = baseUrl + escapeHtml(a.alias);
                                return `<tr>
                                    <td><code>${escapeHtml(a.alias)}</code></td>
                                    <td>${integration ? escapeHtml(integration.name) : '#' + a.integration_id}</td>
                                    <td>
                                        <span style="font-family:monospace;font-size:12px;color:var(--text-light)">${url}</span>
                                        <button class="btn btn-sm btn-secondary" onclick="copyUrl('${url}')" title="Копировать" style="padding:2px 6px;font-size:11px;">⧉</button>
                                    </td>
                                    <td>
                                        <button class="btn btn-sm btn-danger" onclick="deleteAlias(${a.id})" title="Удалить">🗑</button>
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        // ── Integration Modal ───────────────────────────────────────────────
        function openCreateModal() {
            document.getElementById('modal-title').textContent = 'Создать интеграцию';
            document.getElementById('int-id').value = '';
            document.getElementById('int-name').value = '';
            document.getElementById('int-auth-method').value = 'none';
            document.getElementById('int-auth-header').value = '';
            onAuthMethodChange();
            populateTemplateSelect(null);
            populateKeySelect(null);
            document.getElementById('integration-modal').style.display = 'block';
        }

        function editIntegration(id) {
            const item = integrations.find(i => i.id === id);
            if (!item) return;
            document.getElementById('modal-title').textContent = 'Редактировать интеграцию';
            document.getElementById('int-id').value = item.id;
            document.getElementById('int-name').value = item.name;
            document.getElementById('int-auth-method').value = item.auth_method || 'none';
            document.getElementById('int-auth-header').value = item.auth_header || '';
            onAuthMethodChange();
            populateTemplateSelect(item.template_id);
            populateKeySelect(item.auth_secret_id);
            document.getElementById('integration-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('integration-modal').style.display = 'none';
        }

        function onAuthMethodChange() {
            const method = document.getElementById('int-auth-method').value;
            const showHeader = method !== 'none';
            const showSecret = method === 'hmac' || method === 'token';
            document.getElementById('auth-header-group').style.display = showHeader ? '' : 'none';
            document.getElementById('auth-secret-group').style.display = showSecret ? '' : 'none';
        }

        function populateTemplateSelect(selectedId) {
            const sel = document.getElementById('int-template');
            sel.innerHTML = '<option value="">— Выберите шаблон —</option>' +
                templates.map(t => `<option value="${t.id}" ${t.id === selectedId ? 'selected' : ''}>${escapeHtml(t.name)}</option>`).join('');
        }

        function populateKeySelect(selectedId) {
            const sel = document.getElementById('int-auth-secret');
            sel.innerHTML = '<option value="">— Выберите ключ —</option>' +
                keys.map(k => `<option value="${k.id}" ${k.id === selectedId ? 'selected' : ''}>${escapeHtml(k.name)}</option>`).join('');
        }

        function saveIntegration() {
            const id = document.getElementById('int-id').value;
            const name = document.getElementById('int-name').value.trim();
            const templateId = parseInt(document.getElementById('int-template').value);
            const authMethod = document.getElementById('int-auth-method').value;
            const authHeader = document.getElementById('int-auth-header').value.trim() || null;
            const authSecretId = document.getElementById('int-auth-secret').value
                ? parseInt(document.getElementById('int-auth-secret').value) : null;

            if (!name || !templateId) {
                alert('Заполните обязательные поля');
                return;
            }

            const payload = {
                id: id ? parseInt(id) : 0,
                project_id: parseInt(projectId),
                name,
                template_id: templateId,
                auth_method: authMethod,
                auth_header: authHeader,
                auth_secret_id: authSecretId,
            };

            const method = id ? 'PUT' : 'POST';
            const url = id
                ? `${API_BASE}/project/${projectId}/integrations/${id}`
                : `${API_BASE}/project/${projectId}/integrations`;

            api.request(method, url, payload)
                .then(() => {
                    closeModal();
                    loadIntegrations();
                    showNotification(`Интеграция ${id ? 'обновлена' : 'создана'}`, 'success');
                })
                .catch(err => alert('Ошибка: ' + err.message));
        }

        function deleteIntegration(id) {
            if (!confirm('Удалить эту интеграцию?')) return;
            api.request('DELETE', `${API_BASE}/project/${projectId}/integrations/${id}`)
                .then(() => {
                    loadIntegrations();
                    showNotification('Интеграция удалена', 'success');
                })
                .catch(err => alert('Ошибка: ' + err.message));
        }

        // ── Alias Modal ─────────────────────────────────────────────────────
        function openAliasModal() {
            const sel = document.getElementById('alias-integration');
            sel.innerHTML = '<option value="">— Выберите интеграцию —</option>' +
                integrations.map(i => `<option value="${i.id}">${escapeHtml(i.name)}</option>`).join('');
            document.getElementById('alias-value').value = '';
            document.getElementById('alias-modal').style.display = 'block';
        }

        function closeAliasModal() {
            document.getElementById('alias-modal').style.display = 'none';
        }

        function saveAlias() {
            const integrationId = parseInt(document.getElementById('alias-integration').value);
            const alias = document.getElementById('alias-value').value.trim();
            if (!integrationId || !alias) {
                alert('Заполните все поля');
                return;
            }

            api.request('POST', `${API_BASE}/project/${projectId}/integrations/aliases`, {
                id: 0,
                integration_id: integrationId,
                project_id: parseInt(projectId),
                alias,
            })
                .then(() => {
                    closeAliasModal();
                    loadAliases();
                    showNotification('Алиас создан', 'success');
                })
                .catch(err => alert('Ошибка: ' + err.message));
        }

        function deleteAlias(id) {
            if (!confirm('Удалить алиас?')) return;
            api.request('DELETE', `${API_BASE}/project/${projectId}/integrations/aliases/${id}`)
                .then(() => {
                    loadAliases();
                    showNotification('Алиас удалён', 'success');
                })
                .catch(err => alert('Ошибка: ' + err.message));
        }

        // ── Utilities ───────────────────────────────────────────────────────
        function copyUrl(url) {
            navigator.clipboard.writeText(url)
                .then(() => showNotification('URL скопирован', 'success'))
                .catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = url;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    ta.remove();
                    showNotification('URL скопирован', 'success');
                });
        }

        function showNotification(message, type = 'info') {
            const el = document.createElement('div');
            el.className = `alert alert-${type}`;
            el.textContent = message;
            Object.assign(el.style, { position:'fixed', top:'20px', right:'20px', zIndex:'10000', minWidth:'280px' });
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        window.onclick = e => {
            if (e.target === document.getElementById('integration-modal')) closeModal();
            if (e.target === document.getElementById('alias-modal')) closeAliasModal();
        };

        // ── Init ────────────────────────────────────────────────────────────
        Promise.all([loadTemplates(), loadKeys()]).then(() => {
            loadIntegrations();
        });
    </script>
</body>
</html>
