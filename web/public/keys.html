<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ключи доступа - Velum</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar"></aside>

        <div class="main-content">
            <div class="main-header">
                <h2 id="project-title">Ключи доступа</h2>
            </div>

            <div class="main-body">
                <div class="page-header">
                    <h1>🔐 Ключи доступа</h1>
                    <button class="btn btn-primary" onclick="openKeyModal()">+ Новый Ключ</button>
                </div>


                <div id="keys-content">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка ключей...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        if (!projectId) {
            window.location.href = 'index.html';
        }

        api.getProject(projectId)
            .then(project => {
                $('#project-title').textContent = project.name + ' → Ключи доступа';
                document.title = 'Ключи - ' + project.name;
            })
            .catch(console.error);

        loadKeys();

        function getKeySecurityStatus(key) {
            const srcType = key.source_storage_type || 'db';
            if (srcType !== 'db') {
                return { cls: 'badge-success', icon: '🔗', label: 'Внешний' };
            }
            // Local key — check if plaintext content present (no encryption configured)
            const hasPlaintext = !!(key.ssh_key || key.login_password_password);
            if (hasPlaintext) {
                return { cls: 'badge-warning', icon: '⚠️', label: 'Открытый текст' };
            }
            return { cls: 'badge-secondary', icon: '—', label: 'Локально' };
        }

        function loadKeys() {
            const container = $('#keys-content');

            api.getKeys(projectId)
                .then(keys => {
                    if (keys.length === 0) {
                        ui.showEmpty(container, '🔐', 'Нет ключей', 'Создайте первый ключ доступа');
                        return;
                    }

                    // Check if any local keys have plaintext data
                    const plaintextKeys = keys.filter(k => {
                        const srcType = k.source_storage_type || 'db';
                        return srcType === 'db' && !!(k.ssh_key || k.login_password_password);
                    });

                    const banner = plaintextKeys.length > 0
                        ? `<div class="alert" style="background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;">
                            <span style="font-size:20px;">⚠️</span>
                            <div>
                                <strong>Обнаружены ключи в открытом тексте</strong>
                                <div style="font-size:13px;margin-top:2px;color:#555;">
                                    ${plaintextKeys.length} ключ(ей) хранятся в открытом виде в базе данных.
                                    Настройте переменную <code>SEMAPHORE_ACCESS_KEY_ENCRYPTION</code> для включения шифрования.
                                </div>
                            </div>
                           </div>`
                        : '';

                    container.innerHTML = banner + `
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Название</th>
                                    <th>Тип</th>
                                    <th>Источник</th>
                                    <th>Безопасность</th>
                                    <th>Логин / Детали</th>
                                    <th>Действия</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${keys.map(key => {
                                    const srcType = key.source_storage_type || 'db';
                                    const srcLabel = srcType === 'db'
                                        ? 'Локально'
                                        : srcType === 'env'
                                            ? 'Env'
                                            : srcType === 'file'
                                                ? 'File'
                                                : 'Storage';
                                    const srcBadgeCls = srcType === 'db' ? 'badge-secondary'
                                        : (srcType === 'storage' ? 'badge-primary' : 'badge-info');
                                    const details = key.login_password_login
                                        || (key.source_key ? key.source_key : (key.ssh_key ? key.ssh_key.substring(0, 20) + '...' : '—'));
                                    const sec = getKeySecurityStatus(key);
                                    return `
                                    <tr>
                                        <td><strong>${escapeHtml(key.name)}</strong></td>
                                        <td><span class="badge badge-${key.type === 'ssh' ? 'success' : 'warning'}">${key.type === 'ssh' ? 'SSH Key' : 'Login/Password'}</span></td>
                                        <td><span class="badge ${srcBadgeCls}">${srcLabel}</span></td>
                                        <td><span class="badge ${sec.cls}" title="${sec.label}">${sec.icon} ${sec.label}</span></td>
                                        <td>${escapeHtml(details || '—')}</td>
                                        <td>
                                            <button class="btn btn-sm" onclick="editKey(${key.id})">✏️</button>
                                            <button class="btn btn-danger btn-sm" onclick="deleteKey(${key.id})">🗑️</button>
                                        </td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    `;
                })
                .catch(error => {
                    ui.showError(container, error.message);
                });
        }

        function editKey(id) {
            api.getKey(projectId, id)
                .then(key => {
                    openKeyModal(key);
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                });
        }

        function deleteKey(id) {
            if (!confirm('Вы уверены что хотите удалить этот ключ?')) return;

            api.deleteKey(projectId, id)
                .then(() => {
                    ui.showAlert('Ключ удалён', 'success');
                    loadKeys();
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                });
        }

        let secretStoragesCache = [];

        function loadSecretStorages() {
            return api.request('/project/' + projectId + '/secret_storages', { method: 'GET' })
                .then(list => { secretStoragesCache = list || []; })
                .catch(() => { secretStoragesCache = []; });
        }

        function openKeyModal(key = null) {
            const isEdit = !!key;
            const isSSH = key?.type === 'ssh' || !key;
            
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'key-modal';
            modal.innerHTML = `
                <div class="modal" style="max-width: 600px;">
                    <div class="modal-header">
                        <h2>${isEdit ? '✏️ Редактирование' : '➕ Новый'} Ключ</h2>
                    </div>
                    <form id="key-form">
                        <div class="form-group">
                            <label for="name">Название *</label>
                            <input type="text" id="name" class="form-control" required value="${escapeHtml(key?.name || '')}" placeholder="Production SSH Key">
                        </div>
                        <div class="form-group">
                            <label for="type">Тип ключа *</label>
                            <select id="type" class="form-control" required onchange="toggleKeyFields()">
                                <option value="ssh" ${isSSH ? 'selected' : ''}>SSH Key</option>
                                <option value="login_password" ${!isSSH ? 'selected' : ''}>Login/Password</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Источник секрета</label>
                            <div style="display:flex; gap:6px; flex-wrap:wrap;">
                                <label style="display:flex; align-items:center; gap:4px; font-size:13px; cursor:pointer;">
                                    <input type="radio" name="src_type" value="db" ${!key || !key.source_storage_type || key.source_storage_type === 'db' ? 'checked' : ''} onchange="toggleSourceFields()"> Локально
                                </label>
                                <label style="display:flex; align-items:center; gap:4px; font-size:13px; cursor:pointer;">
                                    <input type="radio" name="src_type" value="env" ${key?.source_storage_type === 'env' ? 'checked' : ''} onchange="toggleSourceFields()"> Переменная окружения
                                </label>
                                <label style="display:flex; align-items:center; gap:4px; font-size:13px; cursor:pointer;">
                                    <input type="radio" name="src_type" value="file" ${key?.source_storage_type === 'file' ? 'checked' : ''} onchange="toggleSourceFields()"> Файл
                                </label>
                                <label style="display:flex; align-items:center; gap:4px; font-size:13px; cursor:pointer;">
                                    <input type="radio" name="src_type" value="storage" ${key?.source_storage_type === 'storage' ? 'checked' : ''} onchange="toggleSourceFields()"> Secret Storage
                                </label>
                            </div>
                        </div>
                        <div id="ssh-fields" style="display: ${isSSH ? 'block' : 'none'}">
                            <div class="form-group">
                                <label for="ssh_key">SSH приватный ключ *</label>
                                <textarea id="ssh_key" class="form-control" rows="10" placeholder="-----BEGIN RSA PRIVATE KEY-----&#10;...&#10;-----END RSA PRIVATE KEY-----" style="font-family: monospace; font-size: 13px;">${escapeHtml(key?.ssh_key || '')}</textarea>
                            </div>
                            <div class="form-group">
                                <label for="ssh_passphrase">Passphrase (опционально)</label>
                                <input type="password" id="ssh_passphrase" class="form-control" value="${escapeHtml(key?.ssh_passphrase || '')}" placeholder="Passphrase для ключа">
                            </div>
                        </div>
                        <div id="login-password-fields" style="display: ${!isSSH ? 'block' : 'none'}">
                            <div class="form-group">
                                <label for="login_password_login">Логин *</label>
                                <input type="text" id="login_password_login" class="form-control" required value="${escapeHtml(key?.login_password_login || '')}" placeholder="root">
                            </div>
                            <div class="form-group">
                                <label for="login_password_password">Пароль *</label>
                                <input type="password" id="login_password_password" class="form-control" required value="${escapeHtml(key?.login_password_password || '')}" placeholder="password">
                            </div>
                        </div>
                        <div id="source-fields" class="form-group" style="margin-top:8px;">
                            <label for="source_key">Ключ / путь</label>
                            <input type="text" id="source_key" class="form-control"
                                   value="${escapeHtml(key?.source_key || '')}"
                                   placeholder="ENV_VAR / /path/to/file / storage/key/path">
                            <small style="color:var(--text-light); font-size:12px;">
                                Для Env укажите имя переменной, для File — путь к файлу, для Storage — путь внутри Secret Storage.
                            </small>
                        </div>
                        <div class="form-group" id="storage-select-group" style="display:${key?.source_storage_type === 'storage' ? 'block' : 'none'}">
                            <label for="source_storage_id">Secret Storage</label>
                            <select id="source_storage_id" class="form-control">
                                <option value="">Не выбрано</option>
                            </select>
                        </div>
                        <div class="modal-footer" style="margin-top: 20px;">
                            <button type="button" class="btn" onclick="closeKeyModal()">Отмена</button>
                            <button type="submit" class="btn btn-primary">${isEdit ? 'Сохранить' : 'Создать'}</button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);

            // Загрузить список secret storages для выбора при source_storage_type=storage
            loadSecretStorages().then(() => {
                const select = document.getElementById('source_storage_id');
                if (select) {
                    select.innerHTML = '<option value="">Не выбрано</option>' +
                        secretStoragesCache.map(s =>
                            `<option value="${s.id}" ${key?.source_storage_id === s.id ? 'selected' : ''}>${escapeHtml(s.name)} (${escapeHtml(s.type)})</option>`
                        ).join('');
                }
            });

            toggleSourceFields();

            $('#key-form').addEventListener('submit', (e) => {
                e.preventDefault();
                saveKey(key?.id);
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeKeyModal();
            });
        }

        function toggleKeyFields() {
            const type = $('#type').value;
            $('#ssh-fields').style.display = type === 'ssh' ? 'block' : 'none';
            $('#login-password-fields').style.display = type === 'ssh' ? 'none' : 'block';
        }

        function getSelectedSourceType() {
            const radios = document.querySelectorAll('input[name="src_type"]');
            for (const r of radios) {
                if (r.checked) return r.value;
            }
            return 'db';
        }

        function toggleSourceFields() {
            const src = getSelectedSourceType();
            const srcGroup = document.getElementById('source-fields');
            const storageGroup = document.getElementById('storage-select-group');
            if (!srcGroup) return;
            if (src === 'db') {
                srcGroup.style.display = 'none';
                if (storageGroup) storageGroup.style.display = 'none';
            } else if (src === 'storage') {
                srcGroup.style.display = '';
                if (storageGroup) storageGroup.style.display = 'block';
            } else {
                srcGroup.style.display = '';
                if (storageGroup) storageGroup.style.display = 'none';
            }
        }

        function closeKeyModal() {
            const modal = $('#key-modal');
            if (modal) modal.remove();
        }

        function saveKey(id) {
            const type = $('#type').value;
            const data = {
                name: $('#name').value.trim(),
                type: type,
                project_id: parseInt(projectId)
            };

            if (!data.name) {
                ui.showAlert('Введите название', 'warning');
                return;
            }

            if (type === 'ssh') {
                data.ssh_key = $('#ssh_key').value.trim();
                data.ssh_passphrase = $('#ssh_passphrase').value;
                if (!data.ssh_key) {
                    ui.showAlert('Введите SSH ключ', 'warning');
                    return;
                }
                if (!data.ssh_key.includes('-----BEGIN') || !data.ssh_key.includes('-----END')) {
                    ui.showAlert('Неверный формат SSH ключа', 'warning');
                    return;
                }
            } else {
                data.login_password_login = $('#login_password_login').value.trim();
                data.login_password_password = $('#login_password_password').value;
                if (!data.login_password_login) {
                    ui.showAlert('Введите логин', 'warning');
                    return;
                }
                if (!data.login_password_password) {
                    ui.showAlert('Введите пароль', 'warning');
                    return;
                }
            }

            // Источник секрета
            const srcType = getSelectedSourceType();
            data.source_storage_type = srcType;
            if (srcType === 'db') {
                data.source_storage_id = null;
                data.source_key = null;
            } else {
                const srcKey = document.getElementById('source_key')?.value.trim() || null;
                data.source_key = srcKey;
                if (srcType === 'storage') {
                    const stId = document.getElementById('source_storage_id')?.value;
                    data.source_storage_id = stId ? parseInt(stId) : null;
                } else {
                    data.source_storage_id = null;
                }
            }

            const btn = $('#key-form button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Сохранение...';

            const promise = id 
                ? api.updateKey(projectId, id, data)
                : api.createKey(projectId, data);

            promise
                .then(() => {
                    ui.showAlert(id ? 'Ключ обновлён' : 'Ключ создан', 'success');
                    closeKeyModal();
                    loadKeys();
                })
                .catch(error => {
                    ui.showAlert('Ошибка: ' + error.message, 'danger');
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = id ? 'Сохранить' : 'Создать';
                });
        }

        window.editKey = editKey;
        window.deleteKey = deleteKey;
    </script>
</body>
</html>
