version: '3.8'

# ============================================================================
# Docker Compose для полного развёртывания Semaphore UI
# Все сервисы в Docker: Frontend + PostgreSQL + Backend
# ============================================================================

services:
  # PostgreSQL - база данных
  db:
    image: postgres:15-alpine
    container_name: semaphore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: semaphore
      POSTGRES_USER: semaphore
      POSTGRES_PASSWORD: semaphore_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgres/init-demo.sql:/docker-entrypoint-initdb.d/init-demo.sql:ro
      - ./db/postgres/init-pghba.sh:/docker-entrypoint-initdb.d/init-pghba.sh:ro
    networks:
      - semaphore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semaphore -d semaphore"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend - Rust сервер
  backend:
    build:
      context: ./rust
      dockerfile: Dockerfile
    container_name: semaphore-backend
    restart: unless-stopped
    environment:
      SEMAPHORE_DB_DIALECT: postgres
      SEMAPHORE_DB_URL: postgres://semaphore:semaphore_pass@db:5432/semaphore
      SEMAPHORE_WEB_PATH: /app/web/public
      SEMAPHORE_TMP_PATH: /tmp/semaphore
      SEMAPHORE_TCP_ADDRESS: 0.0.0.0:3000
      RUST_LOG: info
    volumes:
      - ./web/public:/app/web/public:ro
      - semaphore_tmp:/tmp/semaphore
    ports:
      - "3000:3000"
    networks:
      - semaphore-network
    depends_on:
      db:
        condition: service_healthy
    command: ["./semaphore", "server", "--host", "0.0.0.0", "--port", "3000"]

  # Frontend - Nginx для раздачи статики
  frontend:
    image: nginx:alpine
    container_name: semaphore-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./web/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - semaphore-network
    depends_on:
      - backend

networks:
  semaphore-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  semaphore_tmp:
    driver: local
