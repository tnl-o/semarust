version: '3.8'

# ============================================================================
# Docker Compose для гибридного режима Velum
# Только PostgreSQL - Backend и Frontend запускаются на хосте
# ============================================================================
# Использование:
#   docker compose up -d    # Запуск PostgreSQL
#   docker compose down     # Остановка
#   docker compose logs -f  # Логи
# ============================================================================

services:
  # PostgreSQL - база данных
  db:
    image: postgres:15-alpine
    container_name: semaphore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: semaphore
      POSTGRES_USER: semaphore
      POSTGRES_PASSWORD: semaphore_pass
    ports:
      - "5432:5432"
    volumes:
      - semaphore_postgres_data:/var/lib/postgresql/data
      - ./db/postgres/init-demo.sql:/docker-entrypoint-initdb.d/init-demo.sql:ro
      - ./db/postgres/init-pghba.sh:/docker-entrypoint-initdb.d/init-pghba.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semaphore -d semaphore"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  semaphore_postgres_data:
    driver: local
