version: '3.8'

# Docker Compose для демонстрационного окружения Semaphore UI
# Только frontend (статика) + PostgreSQL с демо-данными
# Backend запускается отдельно через cargo
#
# Использование:
#   docker-compose up -d              # Запуск
#   docker-compose down               # Остановка
#   docker-compose logs -f            # Просмотр логов

services:
  # PostgreSQL с демо-данными
  db:
    image: postgres:15-alpine
    container_name: semaphore-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: semaphore
      POSTGRES_USER: semaphore
      POSTGRES_PASSWORD: semaphore123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Инициализация БД демонстрационными данными
      - ./db/postgres/init-demo.sql:/docker-entrypoint-initdb.d/init-demo.sql:ro
    networks:
      - semaphore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semaphore -d semaphore"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Frontend (Nginx для раздачи статики)
  frontend:
    image: nginx:alpine
    container_name: semaphore-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./web/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - semaphore-network

networks:
  semaphore-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
